<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>WatchTogether</title>
<style>
:root{--bg:#0d0d14;--s:#13131a;--c:#1a1a25;--ac:#7c3aed;--a2:#06b6d4;--tx:#f0f0f8;--dm:#6b6b8a;--bd:#2a2a3a;--ok:#10b981;--er:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.bar{display:flex;align-items:center;gap:.5rem;padding:.5rem .9rem;background:var(--s);border-bottom:1px solid var(--bd);flex-shrink:0;flex-wrap:wrap}
.logo{font-weight:800;font-size:1rem;background:linear-gradient(135deg,var(--ac),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.code{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.4);border-radius:6px;padding:.2rem .55rem;font-size:.72rem;font-weight:700;color:var(--a2);cursor:pointer;white-space:nowrap}
.acts{display:flex;gap:.3rem;margin-left:auto;flex-wrap:wrap}
.btn{display:flex;align-items:center;gap:.22rem;padding:.32rem .62rem;border:1px solid var(--bd);border-radius:7px;background:var(--c);color:var(--tx);font-family:inherit;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .14s;white-space:nowrap}
.btn:hover{border-color:var(--ac);color:var(--ac)}
.btn.on{background:var(--ac);border-color:var(--ac);color:#fff}
.btn.grn{background:var(--ok);border-color:var(--ok);color:#fff}
.btn.red{background:var(--er);border-color:var(--er);color:#fff}
.mob{display:none}
.wrap{display:flex;flex:1;overflow:hidden}
/* video area */
.vsec{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#000;min-width:0}
.vbox{flex:1;position:relative;background:#000;overflow:hidden}
.ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.7rem;background:radial-gradient(ellipse at center,#1a1a2e,#000);z-index:2;text-align:center;padding:1rem}
.ph h2{font-size:1.4rem;font-weight:700;color:var(--dm)}
.ph p{color:var(--dm);font-size:.8rem;max-width:300px;line-height:1.6}
/* All video elements — position absolute so they stack */
#ifr,#scrVid,#prvVid{position:absolute;inset:0;display:none;z-index:3}
#ifr{border:none;width:100%;height:100%}
#scrVid,#prvVid{width:100%;height:100%;object-fit:contain;background:#000}
/* direct player */
#plyr{position:absolute;inset:0;display:none;flex-direction:column;background:#000;z-index:3}
#plyr.on{display:flex}
#vid{width:100%;flex:1;background:#000;object-fit:contain;cursor:pointer;display:block;min-height:0}
/* subtitle */
.subov{position:absolute;bottom:76px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:8;max-width:88%}
.subov span{display:inline-block;background:rgba(0,0,0,.85);color:#fff;font-size:clamp(.8rem,2vw,1.05rem);padding:.18rem .62rem;border-radius:5px;line-height:1.5;white-space:pre-wrap}
/* player controls */
.ctrl{flex-shrink:0;background:linear-gradient(0deg,rgba(0,0,0,.97),transparent);padding:.38rem .65rem .32rem;display:flex;flex-direction:column;gap:.3rem;user-select:none}
.srow{display:flex;align-items:center;gap:.38rem}
.tlbl{font-size:.65rem;color:#bbb;white-space:nowrap;min-width:88px}
.seekw{flex:1;position:relative;height:20px;display:flex;align-items:center;cursor:pointer}
.seekt{width:100%;height:4px;background:rgba(255,255,255,.2);border-radius:4px;position:relative}
.seekw:hover .seekt{height:6px}
.seekbuf{height:100%;background:rgba(255,255,255,.3);border-radius:4px;position:absolute;left:0;top:0;width:0}
.seekfil{height:100%;background:var(--ac);border-radius:4px;position:absolute;left:0;top:0;width:0}
.seektm{width:12px;height:12px;background:#fff;border-radius:50%;position:absolute;top:50%;transform:translate(-50%,-50%);pointer-events:none}
.crow{display:flex;align-items:center;gap:.28rem;flex-wrap:wrap}
.cb{background:none;border:none;color:#fff;cursor:pointer;padding:.14rem .22rem;border-radius:4px;font-size:.88rem;display:flex;align-items:center;min-width:22px;justify-content:center}
.cb:hover{background:rgba(255,255,255,.13)}
.cb svg{width:15px;height:15px;fill:#fff}
.vw{display:flex;align-items:center;gap:.2rem}
.vs{width:58px;height:4px;accent-color:var(--ac);cursor:pointer}
.csel{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);border-radius:5px;color:#fff;font-family:inherit;font-size:.65rem;padding:.13rem .28rem;cursor:pointer;max-width:98px}
.csel option{background:#1a1a25}
.sp{flex:1}
/* overlays */
.fsbtn{position:absolute;top:.6rem;right:.6rem;z-index:10;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.2);border-radius:7px;color:#fff;font-size:.72rem;padding:.26rem .58rem;cursor:pointer;display:none;font-family:inherit;font-weight:600;align-items:center;gap:.22rem}
.fsbtn.on{display:flex}
.scrbar{display:none;position:absolute;bottom:.65rem;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);border:1px solid var(--bd);border-radius:9px;padding:.3rem .75rem;gap:.55rem;align-items:center;font-size:.75rem;z-index:10;white-space:nowrap}
.scrbar.on{display:flex}
.qbdg{position:absolute;top:.6rem;left:.6rem;z-index:10;background:rgba(0,0,0,.7);border:1px solid var(--ok);color:var(--ok);padding:.12rem .38rem;border-radius:5px;font-size:.62rem;font-weight:700;display:none}
.qbdg.on{display:block}
/* url bar */
.ubar{display:flex;gap:.32rem;padding:.44rem .62rem;background:var(--s);border-top:1px solid var(--bd);flex-wrap:wrap;flex-shrink:0}
.usel{padding:.34rem .48rem;background:var(--c);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-family:inherit;font-size:.72rem;cursor:pointer}
.uinp{flex:1;padding:.34rem .58rem;background:var(--c);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-family:inherit;font-size:.76rem;min-width:0}
.uinp:focus{outline:none;border-color:var(--ac)}
.ulbtn{padding:.34rem .75rem;background:var(--ac);border:none;border-radius:7px;color:#fff;font-family:inherit;font-size:.76rem;font-weight:600;cursor:pointer}
.ulbtn:hover{background:#6d28d9}
/* subtitle row */
.subrow{display:none;align-items:center;gap:.4rem;padding:.26rem .62rem;background:rgba(6,182,212,.06);border-top:1px solid rgba(6,182,212,.14);font-size:.72rem;color:var(--a2);flex-shrink:0;flex-wrap:wrap}
.subrow.on{display:flex}
.sfbtn{background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.3);border-radius:6px;color:var(--a2);font-family:inherit;font-size:.68rem;font-weight:600;padding:.18rem .48rem;cursor:pointer}
#subFile{display:none}
/* sidebar */
.side{width:300px;display:flex;flex-direction:column;background:var(--s);border-left:1px solid var(--bd);flex-shrink:0}
.stabs{display:flex;border-bottom:1px solid var(--bd)}
.stab{flex:1;padding:.58rem;border:none;background:transparent;color:var(--dm);font-family:inherit;font-size:.72rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.stab.on{color:var(--a2);border-bottom-color:var(--a2)}
.span{display:none;flex:1;flex-direction:column;overflow:hidden}
.span.on{display:flex}
/* users */
.ulist{flex:1;overflow-y:auto;padding:.62rem}
.ui{display:flex;align-items:center;gap:.5rem;padding:.4rem .54rem;border-radius:9px;margin-bottom:.3rem;background:var(--c);border:1px solid var(--bd)}
.uav{width:30px;height:30px;border-radius:50%;background:rgba(124,58,237,.2);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.unm{font-weight:600;font-size:.82rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ubdg{display:flex;gap:.15rem}
.bdg{font-size:.58rem;padding:.06rem .26rem;border-radius:4px;font-weight:700}
.bh{background:rgba(245,158,11,.2);color:#f59e0b}
.bm{background:rgba(16,185,129,.2);color:var(--ok)}
.bs{background:rgba(6,182,212,.2);color:var(--a2)}
.vbar{display:none;align-items:center;gap:.38rem;padding:.36rem .62rem;background:rgba(16,185,129,.07);border-top:1px solid rgba(16,185,129,.18);font-size:.74rem;flex-shrink:0}
.vbar.on{display:flex}
.vdot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:vd 1s ease infinite}
@keyframes vd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
/* chat */
.cmsg{flex:1;overflow-y:auto;padding:.52rem;display:flex;flex-direction:column;gap:.38rem}
.msg{background:var(--c);border:1px solid var(--bd);border-radius:10px 10px 10px 3px;padding:.38rem .52rem}
.msg.me{background:rgba(124,58,237,.12);border-color:rgba(124,58,237,.28);border-radius:10px 10px 3px 10px}
.mh{display:flex;align-items:center;gap:.24rem;margin-bottom:.1rem}
.mn{font-size:.65rem;font-weight:700;color:var(--a2)}
.mt{font-size:.57rem;color:var(--dm);margin-left:auto}
.mb{font-size:.79rem;line-height:1.5;word-break:break-word}
.sys{text-align:center;font-size:.65rem;color:var(--dm);padding:.1rem 0}
.rxbar{display:flex;gap:.26rem;padding:.36rem .54rem;border-top:1px solid var(--bd);overflow-x:auto;flex-shrink:0}
.rxb{border:1px solid var(--bd);background:var(--c);border-radius:7px;padding:.16rem .4rem;font-size:.88rem;cursor:pointer;transition:transform .1s}
.rxb:hover{transform:scale(1.3)}
.carea{display:flex;gap:.32rem;padding:.46rem;border-top:1px solid var(--bd);flex-shrink:0}
.cinp{flex:1;padding:.4rem .56rem;background:var(--c);border:1px solid var(--bd);border-radius:9px;color:var(--tx);font-family:inherit;font-size:.79rem}
.cinp:focus{outline:none;border-color:var(--ac)}
.csnd{padding:.4rem .68rem;background:var(--ac);border:none;border-radius:9px;color:#fff;cursor:pointer;font-size:.88rem}
.csnd:hover{background:#6d28d9}
/* toast */
.toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ok);color:#fff;padding:.48rem 1rem;border-radius:100px;font-weight:600;font-size:.76rem;transition:transform .22s ease;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}
.toast.e{background:var(--er)}.toast.i{background:var(--ac)}
.rxp{position:fixed;font-size:1.8rem;pointer-events:none;animation:fly 2s ease forwards;z-index:9998}
@keyframes fly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-180px) scale(.4)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:10px}
@media(max-width:768px){
  .mob{display:flex}
  .side{position:fixed;right:-100%;top:0;bottom:0;z-index:50;width:min(300px,100vw);transition:right .22s}
  .side.open{right:0}
  .btn .lbl{display:none}
  .vs{width:40px}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="bar">
  <div class="logo">🎬 WatchTogether</div>
  <div class="code" id="codePill" onclick="cpLink()">Copy invite link</div>
  <div class="acts">
    <button class="btn" id="vBtn" onclick="toggleVoice()">🎙️ <span class="lbl">Voice</span></button>
    <button class="btn" id="mBtn" onclick="toggleMute()" style="display:none">🔇 <span class="lbl">Mute</span></button>
    <button class="btn" id="sBtn" onclick="toggleScr()">🖥️ <span class="lbl">Share</span></button>
    <button class="btn" id="unmuteVoiceBtn" onclick="unmuteAllVoice()" style="background:var(--ok);display:none">🔊 <span class="lbl">Unmute Voice</span></button>
    <button class="btn mob" onclick="document.getElementById('side').classList.toggle('open')">💬</button>
    <button class="btn" onclick="leave()" style="border-color:var(--er);color:var(--er)">🚪 <span class="lbl">Leave</span></button>
  </div>
</div>

<div class="wrap">
  <!-- VIDEO SECTION -->
  <div class="vsec">
    <div class="vbox">
      <div class="ph" id="ph">
        <div style="font-size:2.5rem">🎬</div>
        <h2>Nothing Playing</h2>
        <p>Choose a source below and paste a URL, or click Share Screen for Netflix/Prime.</p>
      </div>

      <iframe id="ifr" allowfullscreen allow="autoplay;fullscreen;encrypted-media;picture-in-picture"></iframe>

      <!-- FIX 1: added muted attribute to screen share video for mobile autoplay -->
      <video id="scrVid" autoplay playsinline muted></video>

      <video id="prvVid" autoplay playsinline muted></video>

      <div id="plyr">
        <video id="vid" playsinline></video>
        <div class="subov"><span id="subTxt"></span></div>
        <div class="ctrl">
          <div class="srow">
            <span class="tlbl" id="tlbl">0:00 / 0:00</span>
            <div class="seekw" id="seekw">
              <div class="seekt">
                <div class="seekbuf" id="seekbuf"></div>
                <div class="seekfil" id="seekfil"></div>
                <div class="seektm"  id="seektm"></div>
              </div>
            </div>
          </div>
          <div class="crow">
            <button class="cb" onclick="pPlay()"><svg><path id="pip" d="M8 5v14l11-7z"/></svg></button>
            <button class="cb" onclick="pSkip(-10)">⏮10s</button>
            <button class="cb" onclick="pSkip(10)">10s⏭</button>
            <div class="vw">
              <button class="cb" id="volIco" onclick="pMute()">🔊</button>
              <input type="range" class="vs" id="volSl" min="0" max="1" step="0.02" value="1" oninput="pVol(this.value)"/>
            </div>
            <div class="sp"></div>
            <select class="csel" id="audSel" onchange="pAudio(this.value)" style="display:none"></select>
            <select class="csel" id="subSel" onchange="pSub(this.value)">
              <option value="off">Subs: Off</option>
            </select>
            <select class="csel" onchange="pSpeed(this.value)">
              <option value="0.5">0.5×</option><option value="0.75">0.75×</option>
              <option value="1" selected>1×</option><option value="1.25">1.25×</option>
              <option value="1.5">1.5×</option><option value="2">2×</option>
            </select>
            <button class="cb" onclick="pFull()"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
          </div>
        </div>
      </div>

      <button class="fsbtn" id="fsbtn" onclick="scrFull()">⛶ Fullscreen</button>
      <div class="qbdg" id="qbdg">1080p 60fps</div>
      <div class="scrbar" id="scrbar">
        🖥️ You are sharing your screen
        <button class="btn red" onclick="stopScr()" style="padding:.16rem .46rem;font-size:.68rem">⏹ Stop</button>
      </div>
    </div>

    <div class="ubar">
      <select class="usel" id="srcSel" onchange="srcChg()">
        <option value="direct">🎬 Direct (.mp4 / .mkv)</option>
        <option value="youtube">▶ YouTube</option>
        <option value="gdrive">☁ Google Drive</option>
        <option value="web">🌐 Any Website</option>
      </select>
      <input class="uinp" id="urlInp" placeholder="Paste .mp4 / .mkv / .webm / .m3u8 URL here…"/>
      <button class="ulbtn" onclick="loadVid()">▶ Load</button>
    </div>

    <div class="subrow" id="subrow">
      📄 Tracks: <span id="trkInfo" style="font-size:.68rem;color:var(--dm)">load a video first</span>
      <button class="sfbtn" onclick="document.getElementById('subFile').click()">+ SRT / VTT</button>
      <input type="file" id="subFile" accept=".srt,.vtt" onchange="loadSub(this)"/>
      <span id="subName" style="color:var(--ok);font-size:.7rem"></span>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="side" id="side">
    <div class="stabs">
      <button class="stab on" onclick="stab('chat')">💬 Chat</button>
      <button class="stab"    onclick="stab('users')">👥 Users</button>
    </div>
    <div class="span on" id="p-chat">
      <div class="cmsg" id="msgs"></div>
      <div class="rxbar">
        <button class="rxb" onclick="rx('😂')">😂</button><button class="rxb" onclick="rx('❤️')">❤️</button>
        <button class="rxb" onclick="rx('🔥')">🔥</button><button class="rxb" onclick="rx('😮')">😮</button>
        <button class="rxb" onclick="rx('👏')">👏</button><button class="rxb" onclick="rx('😢')">😢</button>
        <button class="rxb" onclick="rx('💀')">💀</button><button class="rxb" onclick="rx('🍿')">🍿</button>
      </div>
      <div class="carea">
        <input class="cinp" id="cinp" placeholder="Say something…" maxlength="300" onkeydown="if(event.key==='Enter')sendChat()"/>
        <button class="csnd" onclick="sendChat()">➤</button>
      </div>
    </div>
    <div class="span" id="p-users">
      <div class="ulist" id="ulist"></div>
      <div class="vbar" id="vbar">
        <div class="vdot"></div>
        <span style="font-size:.76rem;font-weight:600">Voice Active</span>
        <span id="vcnt" style="margin-left:auto;font-size:.72rem;color:var(--dm)"></span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
'use strict';

const RID  = location.pathname.split('/room/')[1];
const NAME = sessionStorage.getItem('wt-name') || ('Guest' + (Math.random() * 9999 | 0));

let ME = null;
let users = {};

let syncLock = false, syncTmr = null, seekTmr = null;
const VL = {};

let scrOn = false, scrStream = null;
const scrPC = {};

let micOn = false, micMuted = false, micStream = null;
const voicePC = {};
const remAudio = {};

let extCues = [], extSubOn = false;

// ==================== IMPROVED ICE SERVERS (Cloudflare STUN + TURN) ====================
const ICE = {
  iceServers: [
    { urls: 'stun:stun.cloudflare.com:3478' },
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun2.l.google.com:19302' },
    { urls: 'stun:stun4.l.google.com:19302' },
    { urls: 'turn:turn.cloudflare.com:3478?transport=udp', username: 'any', credential: 'any' },
    { urls: 'turn:turn.cloudflare.com:3478?transport=tcp', username: 'any', credential: 'any' }
  ],
  iceCandidatePoolSize: 10,
};

const socket = io({ transports: ['websocket', 'polling'] });

socket.on('connect', () => {
  ME = socket.id;
  document.getElementById('codePill').textContent = '🔗 ' + RID + ' — click to copy';
  socket.emit('join', { roomId: RID, name: NAME });
});

socket.on('init', ({ me, users: u, video: v, msgs, sharer, voiceUsers }) => {
  ME = me;
  users = {};
  u.forEach(x => users[x.id] = x);
  renderUsers();
  msgs.forEach(m => addMsg(m, m.uid === ME));
  if (v && v.url) loadState(v);
  if (sharer && sharer !== ME) {
    setTimeout(() => socket.emit('scr-request', { sharerId: sharer }), 800);
  }
});

socket.on('user-joined', u => {
  users[u.id] = u;
  renderUsers();
  toast(u.name + ' joined 👋', 'i');
  sysMsg(u.av + ' ' + u.name + ' joined');
  if (scrOn)  setTimeout(() => scrOffer(u.id), 400);
  if (micOn)  setTimeout(() => voiceOffer(u.id), 600);
});

socket.on('user-left', ({ id }) => {
  if (users[id]) sysMsg(users[id].av + ' ' + users[id].name + ' left');
  delete users[id];
  closeScrPC(id);
  closeVoicePC(id);
  renderUsers();
});

socket.on('users', list => { users = {}; list.forEach(u => users[u.id] = u); renderUsers(); });

socket.on('v-load',  ({ url, vtype }) => loadState({ url, type: vtype, time: 0, playing: false }));
socket.on('v-play',  ({ time }) => { const v = getVid(); if (!v) return; lock(() => { v.currentTime = time; v.play().catch(() => {}); }); pIcon(true);  });
socket.on('v-pause', ({ time }) => { const v = getVid(); if (!v) return; lock(() => { v.currentTime = time; v.pause(); });               pIcon(false); });
socket.on('v-seek',  ({ time }) => { const v = getVid(); if (!v) return; lock(() => { v.currentTime = time; }); });

socket.on('scr-started', ({ sharerId, name }) => {
  toast(name + ' is sharing screen 🖥️', 'i');
  sysMsg('🖥️ ' + name + ' started sharing');
  socket.emit('scr-request', { sharerId });
});
socket.on('scr-stopped', () => { hideScr(); sysMsg('🖥️ Screen sharing ended'); });
socket.on('scr-viewer',  ({ viewerId }) => { if (scrOn) scrOffer(viewerId); });

socket.on('signal', ({ from, kind, data }) => {
  if (kind === 's-offer')  handleScrOffer(from, data);
  if (kind === 's-answer') handleScrAnswer(from, data);
  if (kind === 's-ice')    handleIce(scrPC[from], data);
  if (kind === 'v-offer')  handleVoiceOffer(from, data);
  if (kind === 'v-answer') handleVoiceAnswer(from, data);
  if (kind === 'v-ice')    handleIce(voicePC[from], data);
});

socket.on('voice-peers', ({ peers }) => peers.forEach(id => setTimeout(() => voiceOffer(id), 150)));
socket.on('voice-new',   ({ id })    => { if (micOn && id !== ME && !voicePC[id]) voiceOffer(id); });
socket.on('voice-gone',  ({ id })    => closeVoicePC(id));

socket.on('msg', m => { addMsg(m, m.uid === ME); scrollMsgs(); });
socket.on('rx',  ({ emoji }) => flyRx(emoji));

// ========== ICE Candidate Buffering ==========
async function handleIce(entry, candidate) {
  if (!entry) return;
  if (entry.pc.remoteDescription) {
    try { await entry.pc.addIceCandidate(candidate); } catch (e) { /* ignore */ }
  } else {
    entry.buf.push(candidate);
  }
}
async function drainBuf(entry) {
  for (const c of entry.buf) {
    try { await entry.pc.addIceCandidate(c); } catch (e) {}
  }
  entry.buf = [];
}

// ========== SCREEN SHARE ==========
async function toggleScr() { scrOn ? stopScr() : await startScr(); }

async function startScr() {
  if (/iPad|iPhone|iPod/.test(navigator.userAgent) && !window.CSS.supports('(-webkit-touch-callout: none)')) {
    toast('Screen sharing not supported on iOS Safari', 'e');
    return;
  }
  try {
    scrStream = await navigator.mediaDevices.getDisplayMedia({
      video: { frameRate: { ideal: 60, max: 60 }, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: { echoCancellation: false, noiseSuppression: false },
    });
    scrOn = true;
    hideAll();
    const pv = document.getElementById('prvVid');
    pv.srcObject = scrStream;
    pv.style.display = 'block';
    document.getElementById('scrbar').classList.add('on');
    document.getElementById('qbdg').classList.add('on');
    document.getElementById('sBtn').classList.add('on');
    document.getElementById('sBtn').innerHTML = '⏹ <span class="lbl">Sharing</span>';
    socket.emit('scr-start');
    Object.keys(users).filter(id => id !== ME).forEach(id => setTimeout(() => scrOffer(id), 200));
    scrStream.getVideoTracks()[0].addEventListener('ended', stopScr);
    toast('Screen sharing started 🖥️', 'i');
  } catch (e) {
    toast(e.name === 'NotAllowedError' ? 'Permission denied' : 'Cannot share screen', 'e');
  }
}

function stopScr() {
  if (scrStream) { scrStream.getTracks().forEach(t => t.stop()); scrStream = null; }
  scrOn = false;
  Object.keys(scrPC).forEach(closeScrPC);
  const pv = document.getElementById('prvVid');
  pv.srcObject = null; pv.style.display = 'none';
  document.getElementById('scrbar').classList.remove('on');
  document.getElementById('qbdg').classList.remove('on');
  document.getElementById('sBtn').classList.remove('on');
  document.getElementById('sBtn').innerHTML = '🖥️ <span class="lbl">Share</span>';
  document.getElementById('ph').style.display = 'flex';
  socket.emit('scr-stop');
  toast('Screen sharing stopped');
}

function closeScrPC(id) {
  if (scrPC[id]) { try { scrPC[id].pc.close(); } catch (e) {} delete scrPC[id]; }
}

async function scrOffer(viewerId) {
  closeScrPC(viewerId);
  const entry = { pc: new RTCPeerConnection(ICE), buf: [] };
  scrPC[viewerId] = entry;
  const { pc } = entry;
  scrStream.getTracks().forEach(t => {
    const sender = pc.addTrack(t, scrStream);
    pc.addEventListener('connectionstatechange', () => {
      if (pc.connectionState === 'connected') {
        const p = sender.getParameters();
        if (!p.encodings) p.encodings = [{}];
        p.encodings[0].maxBitrate = 8_000_000;
        sender.setParameters(p).catch(() => {});
      }
    }, { once: true });
  });
  pc.onicecandidate = e => {
    if (e.candidate) socket.emit('signal', { to: viewerId, kind: 's-ice', data: e.candidate });
  };
  pc.oniceconnectionstatechange = () => {
    if (pc.iceConnectionState === 'failed') pc.restartIce();
  };
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit('signal', { to: viewerId, kind: 's-offer', data: pc.localDescription });
}

async function handleScrOffer(sharerId, sdp) {
  closeScrPC(sharerId);
  const entry = { pc: new RTCPeerConnection(ICE), buf: [] };
  scrPC[sharerId] = entry;
  const { pc } = entry;
  pc.onicecandidate = e => {
    if (e.candidate) socket.emit('signal', { to: sharerId, kind: 's-ice', data: e.candidate });
  };
  pc.oniceconnectionstatechange = () => {
    if (pc.iceConnectionState === 'failed') pc.restartIce();
  };
  const ms = new MediaStream();
  const sv = document.getElementById('scrVid');
  sv.srcObject = ms;
  // FIX 2: ensure muted for autoplay, and force play
  sv.muted = true;
  sv.play().catch(() => {});
  let shown = false;
  pc.ontrack = ({ track }) => {
    ms.addTrack(track);
    if (!shown) {
      shown = true;
      sv.style.display = 'block';
      sv.play().catch(() => {});
      document.getElementById('prvVid').style.display = 'none';
      document.getElementById('ifr').style.display = 'none';
      document.getElementById('plyr').classList.remove('on');
      document.getElementById('ph').style.display = 'none';
      document.getElementById('qbdg').classList.add('on');
      document.getElementById('fsbtn').classList.add('on');
    }
  };
  await pc.setRemoteDescription(sdp);
  await drainBuf(entry);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit('signal', { to: sharerId, kind: 's-answer', data: pc.localDescription });
}

async function handleScrAnswer(viewerId, sdp) {
  const entry = scrPC[viewerId];
  if (!entry) return;
  if (entry.pc.signalingState !== 'have-local-offer') return;
  await entry.pc.setRemoteDescription(sdp);
  await drainBuf(entry);
}

function hideScr() {
  const sv = document.getElementById('scrVid');
  sv.srcObject = null; sv.style.display = 'none';
  document.getElementById('fsbtn').classList.remove('on');
  document.getElementById('qbdg').classList.remove('on');

}

}

function stopVoice() {

// FIX 3: Unmute all incoming voice audio elements (called by user gesture)
function unmuteAllVoice() {
  let unmuted = 0;
  Object.values(remAudio).forEach(audio => {
    if (audio.muted) {
      audio.muted = false;
      unmuted++;
    }
  });
  if (unmuted) toast(`Unmuted ${unmuted} voice streams 🔊`, 'i');
  else toast('No muted voice streams', 'i');
}

function closeVoicePC(id) {
  if (voicePC[id]) { try { voicePC[id].pc.close(); } catch (e) {} delete voicePC[id]; }
  if (remAudio[id]) { remAudio[id].remove(); delete remAudio[id]; }
  renderUsers();
}

function makeVPC(peerId) {
  closeVoicePC(peerId);
  const entry = { pc: new RTCPeerConnection(ICE), buf: [] };
  voicePC[peerId] = entry;
  const { pc } = entry;
  if (micStream) {
    micStream.getAudioTracks().forEach(t => pc.addTrack(t, micStream));
  }
  pc.onicecandidate = e => {
    if (e.candidate) socket.emit('signal', { to: peerId, kind: 'v-ice', data: e.candidate });
  };
  pc.oniceconnectionstatechange = () => {
    if (pc.iceConnectionState === 'failed') pc.restartIce();
    if (pc.iceConnectionState === 'disconnected') {
      setTimeout(() => { if (voicePC[peerId]?.pc === pc && pc.iceConnectionState === 'disconnected') pc.restartIce(); }, 5000);
    }
  };
  pc.ontrack = ({ track }) => {
    const ms = new MediaStream([track]);
    if (remAudio[peerId]) remAudio[peerId].remove();
    const audio = document.createElement('audio');
    audio.srcObject = ms;
    audio.autoplay = true;
    audio.muted = true;   // FIX 4: start muted to allow autoplay on mobile
    audio.volume = 1.0;
    audio.playsInline = true;
    audio.style.display = 'none';
    document.body.appendChild(audio);
    remAudio[peerId] = audio;
    audio.play().catch(e => console.warn('audio play', e));
    renderUsers();
  };
  return entry;
}

async function voiceOffer(peerId) {
  if (voicePC[peerId]) return;
  const entry = makeVPC(peerId);
  try {
    const offer = await entry.pc.createOffer({ offerToReceiveAudio: true });
    await entry.pc.setLocalDescription(offer);
    socket.emit('signal', { to: peerId, kind: 'v-offer', data: entry.pc.localDescription });
  } catch (e) {
    console.warn('voiceOffer failed', e);
    closeVoicePC(peerId);
  }
}

async function handleVoiceOffer(fromId, sdp) {
  const entry = makeVPC(fromId);
  try {
    await entry.pc.setRemoteDescription(sdp);
    await drainBuf(entry);
    const answer = await entry.pc.createAnswer();
    await entry.pc.setLocalDescription(answer);
    socket.emit('signal', { to: fromId, kind: 'v-answer', data: entry.pc.localDescription });
  } catch (e) {
    console.warn('handleVoiceOffer failed', e);
    closeVoicePC(fromId);
  }
}

async function handleVoiceAnswer(fromId, sdp) {
  const entry = voicePC[fromId];
  if (!entry) return;
  if (entry.pc.signalingState !== 'have-local-offer') return;
  try {
    await entry.pc.setRemoteDescription(sdp);
    await drainBuf(entry);
  } catch (e) {
    console.warn('handleVoiceAnswer failed', e);
  }
}

function startPlayer(url, t0, play0) {
  const vid = document.getElementById('vid');
  Object.entries(VL).forEach(([ev, fn]) => vid.removeEventListener(ev, fn));
  for (const k in VL) delete VL[k];
  extCues = []; extSubOn = false;
  document.getElementById('subTxt').textContent = '';
  document.getElementById('subSel').innerHTML = '<option value="off">Subs: Off</option>';
  document.getElementById('subName').textContent = '';
  document.getElementById('trkInfo').textContent = 'Loading…';
  document.getElementById('plyr').classList.add('on');
  vid.src = url;
  vid.load();
  vid.addEventListener('loadedmetadata', () => {
    if (t0 > 0) vid.currentTime = t0;
    if (play0) vid.play().catch(() => {}); else pIcon(false);
    buildTracks();
    updTime(); updSeek();
  }, { once: true });
  const fns = {
    timeupdate: () => { updTime(); updSeek(); if (extSubOn) renderSub(vid.currentTime); },
    progress:   () => updBuf(),
    play:  () => { if (syncLock) return; pIcon(true);  socket.emit('v-play',  { time: vid.currentTime }); },
    pause: () => { if (syncLock) return; pIcon(false); socket.emit('v-pause', { time: vid.currentTime }); },
    seeked: () => {
      if (syncLock) return;
      clearTimeout(seekTmr);
      seekTmr = setTimeout(() => socket.emit('v-seek', { time: vid.currentTime }), 350);
    },
    click: () => pPlay(),
  };
  Object.entries(fns).forEach(([ev, fn]) => { VL[ev] = fn; vid.addEventListener(ev, fn); });
}

function buildTracks() {
  const vid = document.getElementById('vid');
  const subSel = document.getElementById('subSel');
  const audSel = document.getElementById('audSel');
  const info = [];
  if (vid.audioTracks && vid.audioTracks.length > 1) {
    audSel.innerHTML = '';
    [...vid.audioTracks].forEach((t, i) => {
      const o = document.createElement('option');
      o.value = i;
      o.textContent = t.label || t.language || 'Audio ' + (i + 1);
      audSel.appendChild(o);
    });
    audSel.style.display = 'block';
    info.push('🔊 ' + vid.audioTracks.length + ' audio tracks');
  } else {
    audSel.style.display = 'none';
  }
  const tt = [...vid.textTracks];
  if (tt.length) {
    tt.forEach(t => { t.mode = 'hidden'; });
    tt.forEach((t, i) => {
      const o = document.createElement('option');
      o.value = 'int:' + i;
      o.textContent = '📝 ' + (t.label || t.language || 'Sub ' + (i + 1));
      subSel.appendChild(o);
      t.addEventListener('cuechange', () => {
        if (document.getElementById('subSel').value !== 'int:' + i) return;
        const cue = t.activeCues?.[0];
        document.getElementById('subTxt').textContent = cue ? (cue.text || cue.data || '') : '';
      });
    });
    info.push('📝 ' + tt.length + ' subtitle track(s)');
  }
  document.getElementById('trkInfo').textContent = info.length ? info.join(' · ') : 'No internal tracks — use + SRT/VTT';
}

function pSub(val) {
  const vid = document.getElementById('vid');
  [...vid.textTracks].forEach(t => { t.mode = 'hidden'; });
  document.getElementById('subTxt').textContent = '';
  extSubOn = false;
  if (val === 'off') return;
  if (val.startsWith('int:')) {
    const t = vid.textTracks[+val.split(':')[1]];
    if (t) t.mode = 'hidden';
    return;
  }
  if (val === 'ext') extSubOn = true;
}

function pAudio(idx) {
  const vid = document.getElementById('vid');
  if (!vid.audioTracks) return;
  [...vid.audioTracks].forEach((t, i) => t.enabled = i === +idx);
}

function loadSub(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const txt = e.target.result;
    extCues = file.name.toLowerCase().endsWith('.srt') ? parseSRT(txt) : parseVTT(txt);
    extSubOn = true;
    const sel = document.getElementById('subSel');
    let opt = sel.querySelector('option[value="ext"]');
    if (!opt) { opt = document.createElement('option'); opt.value = 'ext'; sel.appendChild(opt); }
    opt.textContent = '📄 ' + file.name;
    sel.value = 'ext';
    document.getElementById('subName').textContent = '✅ ' + file.name;
    toast('Subtitles loaded ✅', 'i');
  };
  reader.readAsText(file, 'UTF-8');
}

function renderSub(t) {
  if (!extSubOn || !extCues.length) return;
  const c = extCues.find(x => t >= x.s && t <= x.e);
  document.getElementById('subTxt').textContent = c ? c.t : '';
}

function parseSRT(txt) {
  return txt.replace(/\r\n/g, '\n').trim().split(/\n\n+/).map(b => {
    const ls = b.split('\n'); if (ls.length < 3) return null;
    const m = ls[1].match(/(\d+:\d+:\d+[,.]\d+)\s*-->\s*(\d+:\d+:\d+[,.]\d+)/);
    if (!m) return null;
    return { s: srtT(m[1]), e: srtT(m[2]), t: ls.slice(2).join('\n').replace(/<[^>]+>/g, '') };
  }).filter(Boolean);
}
function srtT(s) { const [h, mn, r] = s.split(':'), [sc, ms] = r.replace(',', '.').split('.'); return +h * 3600 + +mn * 60 + +sc + +ms / 1000; }
function parseVTT(txt) {
  return txt.replace(/\r\n/g, '\n').replace(/^WEBVTT[^\n]*/, '').trim().split(/\n\n+/).map(b => {
    const ls = b.split('\n').filter(l => l.trim() && !l.startsWith('NOTE'));
    const tl = ls.find(l => l.includes('-->'));
    if (!tl) return null;
    const m = tl.match(/([\d:.]+)\s*-->\s*([\d:.]+)/);
    if (!m) return null;
    return { s: vttT(m[1]), e: vttT(m[2]), t: ls.slice(ls.indexOf(tl) + 1).join('\n').replace(/<[^>]+>/g, '') };
  }).filter(Boolean);
}
function vttT(s) { const p = s.split(':').map(Number); return p.length === 3 ? p[0] * 3600 + p[1] * 60 + p[2] : p[0] * 60 + p[1]; }

// ========== Seek Bar ==========
const seekEl = document.getElementById('seekw');
let sDrag = false;
function seekAt(e) {
  const vid = document.getElementById('vid'); if (!vid.duration) return;
  const r = seekEl.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  vid.currentTime = Math.max(0, Math.min(1, (cx - r.left) / r.width)) * vid.duration;
}
seekEl.addEventListener('mousedown', e => { sDrag = true; seekAt(e); });
document.addEventListener('mousemove', e => { if (sDrag) seekAt(e); });
document.addEventListener('mouseup', () => sDrag = false);
seekEl.addEventListener('touchstart', e => { sDrag = true; seekAt(e); }, { passive: true });
seekEl.addEventListener('touchmove',  e => { if (sDrag) seekAt(e); }, { passive: true });
seekEl.addEventListener('touchend', () => sDrag = false);
function updSeek() {
  const vid = document.getElementById('vid'); if (!vid.duration) return;
  const p = (vid.currentTime / vid.duration) * 100;
  document.getElementById('seekfil').style.width = p + '%';
  document.getElementById('seektm').style.left = p + '%';
}
function updBuf() {
  const vid = document.getElementById('vid');
  if (!vid.duration || !vid.buffered.length) return;
  document.getElementById('seekbuf').style.width = ((vid.buffered.end(vid.buffered.length - 1) / vid.duration) * 100) + '%';
}
function updTime() {
  const vid = document.getElementById('vid');
  document.getElementById('tlbl').textContent = fmt(vid.currentTime) + ' / ' + fmt(vid.duration || 0);
}
function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), ss = Math.floor(s % 60);
  return h ? `${h}:${pad(m)}:${pad(ss)}` : `${m}:${pad(ss)}`;
}
function pad(n) { return String(n).padStart(2, '0'); }
function lock(fn) { syncLock = true; clearTimeout(syncTmr); fn(); syncTmr = setTimeout(() => syncLock = false, 900); }
function getVid() { const v = document.getElementById('vid'); return document.getElementById('plyr').classList.contains('on') && v.src ? v : null; }
function pPlay()  { const v = document.getElementById('vid'); if (!v.src) return; v.paused ? v.play().catch(() => {}) : v.pause(); }
function pSkip(s) { const v = document.getElementById('vid'); if (!v.src) return; v.currentTime = Math.max(0, Math.min(v.duration || 0, v.currentTime + s)); }
function pVol(val){ document.getElementById('vid').volume = val; document.getElementById('volIco').textContent = val == 0 ? '🔇' : val < .5 ? '🔈' : '🔊'; }
function pMute()  { const v = document.getElementById('vid'); v.muted = !v.muted; document.getElementById('volIco').textContent = v.muted ? '🔇' : '🔊'; document.getElementById('volSl').value = v.muted ? 0 : v.volume; }
function pSpeed(v){ document.getElementById('vid').playbackRate = parseFloat(v); }
function pFull()  { const w = document.getElementById('plyr'); (w.requestFullscreen || w.webkitRequestFullscreen).call(w); }
function pIcon(pl){ document.getElementById('pip').setAttribute('d', pl ? 'M6 19h4V5H6v14zm8-14v14h4V5h-4z' : 'M8 5v14l11-7z'); }

function renderUsers() {
  const ul = document.getElementById('ulist'); ul.innerHTML = '';
  const inV = Object.keys(remAudio).length + (micOn ? 1 : 0);
  document.getElementById('vcnt').textContent = inV ? inV + ' in voice' : '';
  Object.values(users).forEach(u => {
    const me = u.id === ME, mic = (me && micOn) || !!remAudio[u.id], scr = me && scrOn;
    const d = document.createElement('div'); d.className = 'ui';
    d.innerHTML = `<div class="uav">${u.av||'🦊'}</div><div class="unm">${esc(u.name)}${me?' (You)':''}</div><div class="ubdg">${me?'<span class="bdg bh">HOST</span>':''}${mic?'<span class="bdg bm">🎙️</span>':''}${scr?'<span class="bdg bs">🖥️</span>':''}</div>`;
    ul.appendChild(d);
  });
}

// ========== UI Helpers ==========
function stab(t) {
  document.querySelectorAll('.stab').forEach((b, i) => b.classList.toggle('on', (t === 'chat' && i === 0) || (t === 'users' && i === 1)));
  document.getElementById('p-chat').classList.toggle('on', t === 'chat');
  document.getElementById('p-users').classList.toggle('on', t === 'users');
}
function cpLink() { navigator.clipboard.writeText(location.href).then(() => toast('Link copied! Share with friends 🔗')).catch(() => toast('Copy from address bar', 'i')); }
function leave()  { stopScr(); stopVoice(); socket.disconnect(); location.href = '/'; }
function toast(msg, type = '') { const t = document.getElementById('toast'); t.textContent = msg; t.className = 'toast on' + (type ? ' ' + type : ''); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('on'), 3200); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function ytId(u) { const m = u.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/)([^&\n?#]+)/); return m ? m[1] : null; }
function gdId(u) { const m = u.match(/\/d\/([a-zA-Z0-9_-]+)/); return m ? m[1] : null; }

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (['INPUT', 'TEXTAREA'].includes(document.activeElement?.tagName)) return;
  if (e.code === 'Space') { e.preventDefault(); pPlay(); }
  else if (e.code === 'ArrowLeft')  pSkip(-10);
  else if (e.code === 'ArrowRight') pSkip(10);
  else if (e.code === 'KeyM')       pMute();
  else if (e.code === 'KeyF')       pFull();
});

window.addEventListener('beforeunload', () => { stopScr(); stopVoice(); });
document.addEventListener('click', e => {
  const sb = document.getElementById('side');
  if (window.innerWidth <= 768 && sb.classList.contains('open') && !sb.contains(e.target) && !e.target.closest('.mob'))
    sb.classList.remove('open');
});

// Auto-unmute voice on first user click (optional)
let voiceUnmuted = false;
document.addEventListener('click', () => {
  if (!voiceUnmuted && Object.keys(remAudio).length) {
    unmuteAllVoice();
    voiceUnmuted = true;
  }
}, { once: true });

if (!sessionStorage.getItem('wt-name')) {
  const n = prompt('Enter your name to join:');
  if (n && n.trim()) { sessionStorage.setItem('wt-name', n.trim()); location.reload(); }
  else location.href = '/';
}
srcChg();
</script>
