<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>WatchTogether – Room</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a0f;--sur:#13131a;--card:#1a1a25;
  --acc:#7c3aed;--acc2:#06b6d4;--acc3:#f59e0b;
  --txt:#f0f0f8;--mute:#6b6b8a;--brd:#2a2a3a;
  --ok:#10b981;--err:#ef4444;--sw:320px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Space Grotesk',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* TOP BAR */
.bar{display:flex;align-items:center;gap:.55rem;padding:.52rem .9rem;background:var(--sur);border-bottom:1px solid var(--brd);flex-shrink:0;flex-wrap:wrap}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:2px;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.cpill{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.4);border-radius:8px;padding:.26rem .62rem;font-size:.74rem;font-weight:700;color:var(--acc2);cursor:pointer;white-space:nowrap}
.acts{display:flex;gap:.32rem;margin-left:auto;flex-wrap:wrap}
.btn{display:flex;align-items:center;gap:.28rem;padding:.36rem .68rem;border:1px solid var(--brd);border-radius:8px;background:var(--card);color:var(--txt);font-family:'Space Grotesk',sans-serif;font-size:.74rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn.on {background:var(--acc);border-color:var(--acc);color:#fff}
.btn.grn{background:var(--ok) ;border-color:var(--ok) ;color:#fff}
.btn.red{background:var(--err);border-color:var(--err);color:#fff}
.mob{display:none}

/* LAYOUT */
.wrap{display:flex;flex:1;overflow:hidden}

/* VIDEO AREA */
.vsec{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#000;min-width:0}
.vbox{flex:1;position:relative;background:#000;overflow:hidden}

/* placeholder */
.ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.85rem;background:radial-gradient(ellipse at center,#1a1a2e 0%,#000 70%);z-index:1}
.ph-ico{font-size:3rem}
.ph h2{font-family:'Bebas Neue',sans-serif;font-size:1.65rem;letter-spacing:2px;color:var(--mute)}
.ph p{color:var(--mute);font-size:.82rem;text-align:center;padding:0 1.5rem;max-width:340px;line-height:1.6}

/* iframe / receive / preview */
#ifr   {width:100%;height:100%;border:none;display:none;position:absolute;inset:0}
#scrVid{width:100%;height:100%;object-fit:contain;display:none;background:#000;position:absolute;inset:0}
#prvVid{width:100%;height:100%;object-fit:contain;display:none;background:#000;position:absolute;inset:0}

/* DIRECT PLAYER */
#plyr{position:absolute;inset:0;display:none;flex-direction:column;background:#000}
#plyr.show{display:flex}
#vid{width:100%;flex:1;background:#000;object-fit:contain;cursor:pointer;min-height:0;display:block}

/* subtitle overlay */
.subox{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:15;max-width:90%;width:max-content}
.sutxt{display:inline-block;background:rgba(0,0,0,.82);color:#fff;font-size:clamp(.88rem,2.3vw,1.13rem);padding:.2rem .68rem;border-radius:5px;line-height:1.5;white-space:pre-wrap;max-width:100%}

/* player controls */
.ctrl{flex-shrink:0;background:linear-gradient(0deg,rgba(0,0,0,.97),rgba(0,0,0,.5));padding:.42rem .68rem .36rem;display:flex;flex-direction:column;gap:.36rem;user-select:none}
.srow{display:flex;align-items:center;gap:.42rem}
.tlbl{font-size:.68rem;color:#ccc;white-space:nowrap;min-width:92px}
.sw  {flex:1;position:relative;height:20px;display:flex;align-items:center;cursor:pointer}
.st  {width:100%;height:4px;background:rgba(255,255,255,.18);border-radius:4px;position:relative;transition:height .12s}
.sw:hover .st{height:6px}
.sbuf{height:100%;background:rgba(255,255,255,.28);border-radius:4px;position:absolute;left:0;top:0;width:0}
.sfil{height:100%;background:var(--acc);border-radius:4px;position:absolute;left:0;top:0;width:0}
.sthm{width:13px;height:13px;background:#fff;border-radius:50%;position:absolute;top:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 4px rgba(0,0,0,.5);transition:transform .12s}
.sw:hover .sthm{transform:translate(-50%,-50%) scale(1.35)}
.crow{display:flex;align-items:center;gap:.32rem;flex-wrap:wrap}
.cb  {background:none;border:none;color:#fff;cursor:pointer;padding:.16rem .26rem;border-radius:4px;font-size:.93rem;display:flex;align-items:center;justify-content:center;min-width:25px;transition:background .12s}
.cb:hover{background:rgba(255,255,255,.14)}
.cb svg{width:17px;height:17px;fill:#fff}
.vw  {display:flex;align-items:center;gap:.26rem}
.vs  {width:66px;height:4px;accent-color:var(--acc);cursor:pointer}
.csel{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:6px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.68rem;padding:.16rem .32rem;cursor:pointer;max-width:108px}
.csel option{background:#1a1a25;color:#fff}
.sp{flex:1}

/* overlay elements */
.fsbtn{position:absolute;top:.62rem;right:.62rem;z-index:25;background:rgba(0,0,0,.68);border:1px solid rgba(255,255,255,.22);border-radius:8px;color:#fff;font-size:.74rem;padding:.3rem .62rem;cursor:pointer;display:none;font-family:'Space Grotesk',sans-serif;font-weight:600;align-items:center;gap:.28rem}
.fsbtn.show{display:flex}
.sbar{display:none;position:absolute;bottom:.72rem;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);border:1px solid var(--brd);border-radius:10px;padding:.36rem .82rem;gap:.62rem;align-items:center;font-size:.78rem;z-index:25;white-space:nowrap}
.sbar.show{display:flex}
.qbdg{position:absolute;top:.62rem;left:.62rem;z-index:25;background:rgba(0,0,0,.72);border:1px solid var(--ok);color:var(--ok);padding:.14rem .42rem;border-radius:5px;font-size:.64rem;font-weight:700;display:none}
.qbdg.show{display:block}

/* URL BAR */
.ubar{display:flex;gap:.38rem;padding:.48rem .68rem;background:var(--sur);border-top:1px solid var(--brd);flex-wrap:wrap;flex-shrink:0}
.usel{padding:.38rem .52rem;background:var(--card);border:1px solid var(--brd);border-radius:8px;color:var(--txt);font-family:'Space Grotesk',sans-serif;font-size:.74rem;cursor:pointer}
.uinp{flex:1;padding:.38rem .62rem;background:var(--card);border:1px solid var(--brd);border-radius:8px;color:var(--txt);font-family:'Space Grotesk',sans-serif;font-size:.78rem;min-width:0}
.uinp:focus{outline:none;border-color:var(--acc)}
.ulbtn{padding:.38rem .82rem;background:var(--acc);border:none;border-radius:8px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap}
.ulbtn:hover{background:#6d28d9}

/* subtitle/track panel */
.subrow{display:none;align-items:center;gap:.45rem;padding:.3rem .68rem;background:rgba(6,182,212,.06);border-top:1px solid rgba(6,182,212,.16);font-size:.74rem;color:var(--acc2);flex-shrink:0;flex-wrap:wrap}
.subrow.show{display:flex}
.sfbtn{background:rgba(6,182,212,.13);border:1px solid rgba(6,182,212,.36);border-radius:6px;color:var(--acc2);font-family:'Space Grotesk',sans-serif;font-size:.71rem;font-weight:600;padding:.2rem .52rem;cursor:pointer}
#subFile{display:none}

/* SIDEBAR */
.side{width:var(--sw);display:flex;flex-direction:column;background:var(--sur);border-left:1px solid var(--brd);flex-shrink:0}
.stabs{display:flex;border-bottom:1px solid var(--brd)}
.stab{flex:1;padding:.62rem;border:none;background:transparent;color:var(--mute);font-family:'Space Grotesk',sans-serif;font-size:.74rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .18s}
.stab.on{color:var(--acc2);border-bottom-color:var(--acc2)}
.span{display:none;flex:1;flex-direction:column;overflow:hidden}
.span.on{display:flex}

/* users */
.ulist{flex:1;overflow-y:auto;padding:.68rem}
.ui{display:flex;align-items:center;gap:.58rem;padding:.44rem .58rem;border-radius:10px;margin-bottom:.36rem;background:var(--card);border:1px solid var(--brd);transition:border-color .22s}
.ui.spk{border-color:var(--ok);background:rgba(16,185,129,.07)}
.uav{width:32px;height:32px;border-radius:50%;background:rgba(124,58,237,.2);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.unm{font-weight:600;font-size:.85rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ubdg{display:flex;gap:.2rem;flex-shrink:0}
.bdg{font-size:.62rem;padding:.09rem .3rem;border-radius:4px;font-weight:700}
.bh{background:rgba(245,158,11,.2);color:var(--acc3)}
.bm{background:rgba(16,185,129,.2);color:var(--ok)}
.bs{background:rgba(6,182,212,.2);color:var(--acc2)}
.vbar{display:none;align-items:center;gap:.42rem;padding:.4rem .68rem;background:rgba(16,185,129,.07);border-top:1px solid rgba(16,185,129,.2);font-size:.76rem;flex-shrink:0}
.vbar.show{display:flex}
.vdot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:vd 1.1s ease infinite}
@keyframes vd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}

/* chat */
.cmsg{flex:1;overflow-y:auto;padding:.58rem;display:flex;flex-direction:column;gap:.42rem}
.msg{background:var(--card);border:1px solid var(--brd);border-radius:11px 11px 11px 3px;padding:.42rem .58rem}
.msg.me{background:rgba(124,58,237,.11);border-color:rgba(124,58,237,.28);border-radius:11px 11px 3px 11px}
.mh{display:flex;align-items:center;gap:.28rem;margin-bottom:.16rem}
.mn{font-size:.68rem;font-weight:700;color:var(--acc2)}
.mt{font-size:.6rem;color:var(--mute);margin-left:auto}
.mb{font-size:.82rem;line-height:1.5;word-break:break-word}
.sys{text-align:center;font-size:.68rem;color:var(--mute);padding:.16rem 0}
.rxbar{display:flex;gap:.3rem;padding:.4rem .6rem;border-top:1px solid var(--brd);overflow-x:auto;flex-shrink:0}
.rxb{border:1px solid var(--brd);background:var(--card);border-radius:8px;padding:.2rem .44rem;font-size:.93rem;cursor:pointer;transition:transform .12s}
.rxb:hover{transform:scale(1.3)}
.carea{display:flex;gap:.38rem;padding:.52rem;border-top:1px solid var(--brd);flex-shrink:0}
.cinp{flex:1;padding:.44rem .6rem;background:var(--card);border:1px solid var(--brd);border-radius:10px;color:var(--txt);font-family:'Space Grotesk',sans-serif;font-size:.82rem}
.cinp:focus{outline:none;border-color:var(--acc)}
.csnd{padding:.44rem .72rem;background:var(--acc);border:none;border-radius:10px;color:#fff;cursor:pointer;font-size:.93rem}
.csnd:hover{background:#6d28d9}

/* toast */
.toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%) translateY(120px);background:var(--ok);color:#fff;padding:.52rem 1.1rem;border-radius:100px;font-weight:600;font-size:.79rem;transition:transform .26s ease;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.e{background:var(--err)}.toast.i{background:var(--acc)}

/* reactions */
.rxp{position:fixed;font-size:2rem;pointer-events:none;animation:fly 2s ease forwards;z-index:9998}
@keyframes fly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-200px) scale(.4)}}

/* scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:10px}

/* mobile */
@media(max-width:768px){
  .mob{display:flex}
  .side{position:fixed;right:-100%;top:0;bottom:0;z-index:50;width:min(320px,100vw);transition:right .26s}
  .side.open{right:0}
  .btn .lbl{display:none}
  .vs{width:48px}
}
@media(max-width:420px){.logo{font-size:1.05rem}}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="bar">
  <div class="logo">WatchTogether</div>
  <div class="cpill" onclick="cpLink()" title="Copy invite link">🔗 <span id="codeSpan">------</span></div>
  <div class="acts">
    <button class="btn" id="vBtn" onclick="toggleVoice()">🎙️ <span class="lbl">Voice</span></button>
    <button class="btn" id="mBtn" onclick="toggleMute()" style="display:none">🔇 <span class="lbl">Mute</span></button>
    <button class="btn" id="sBtn" onclick="toggleScreen()">🖥️ <span class="lbl">Share</span></button>
    <button class="btn mob" onclick="toggleSide()">💬 <span class="lbl">Chat</span></button>
    <button class="btn" onclick="leaveRoom()" style="border-color:var(--err);color:var(--err)">🚪</button>
  </div>
</div>

<div class="wrap">
  <!-- VIDEO SECTION -->
  <div class="vsec">
    <div class="vbox" id="vbox">

      <!-- Placeholder -->
      <div class="ph" id="ph">
        <div class="ph-ico">🎬</div>
        <h2>No Video Playing</h2>
        <p>Select source type, paste URL, click Load.<br>For Netflix/Prime/Disney+ → use Screen Share.</p>
      </div>

      <!-- iframe for YouTube / GDrive / any site -->
      <iframe id="ifr" allowfullscreen allow="autoplay;fullscreen;encrypted-media;picture-in-picture"></iframe>

      <!-- Screen share received from peer -->
      <video id="scrVid" autoplay playsinline></video>

      <!-- Local screen share preview -->
      <video id="prvVid" autoplay playsinline muted></video>

      <!-- ═══════════════════════════════════════════════════
           DIRECT VIDEO PLAYER
      ════════════════════════════════════════════════════ -->
      <div id="plyr">
        <!-- Main video element — NO autoplay attr, we call .play() manually -->
        <video id="vid" playsinline></video>

        <!-- Subtitle overlay -->
        <div class="subox"><span class="sutxt" id="sutxt"></span></div>

        <!-- Controls -->
        <div class="ctrl">
          <!-- Seek bar row -->
          <div class="srow">
            <span class="tlbl" id="tlbl">0:00 / 0:00</span>
            <div class="sw" id="seekEl">
              <div class="st">
                <div class="sbuf" id="sbuf"></div>
                <div class="sfil" id="sfil"></div>
                <div class="sthm" id="sthm"></div>
              </div>
            </div>
          </div>
          <!-- Buttons row -->
          <div class="crow">
            <button class="cb" onclick="pPlay()" title="Play/Pause (Space)">
              <svg><path id="pip" d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="cb" onclick="pSkip(-10)" title="Back 10s (←)">⏮10</button>
            <button class="cb" onclick="pSkip(10)"  title="Fwd 10s (→)" >10⏭</button>
            <div class="vw">
              <button class="cb" id="volIco" onclick="pMute()" title="Mute (M)">🔊</button>
              <input type="range" class="vs" id="volSl" min="0" max="1" step="0.02" value="1"
                oninput="pVol(this.value)"/>
            </div>
            <div class="sp"></div>
            <select class="csel" id="audSel" onchange="pAudio(this.value)" style="display:none" title="Audio Track"></select>
            <select class="csel" id="subSel" onchange="pSub(this.value)" title="Subtitles">
              <option value="off">Subs: Off</option>
            </select>
            <select class="csel" onchange="pSpeed(this.value)" title="Speed">
              <option value="0.5">0.5×</option><option value="0.75">0.75×</option>
              <option value="1" selected>1×</option><option value="1.25">1.25×</option>
              <option value="1.5">1.5×</option><option value="2">2×</option>
            </select>
            <button class="cb" onclick="pFull()" title="Fullscreen (F)">
              <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Overlay buttons -->
      <button class="fsbtn" id="fsbtn" onclick="scrFull()">⛶ Fullscreen</button>
      <div class="qbdg" id="qbdg">1080p 60fps</div>
      <div class="sbar" id="sbar">
        🖥️ Sharing your screen
        <button class="btn red" onclick="stopScreen()" style="padding:.2rem .52rem;font-size:.71rem">⏹ Stop</button>
      </div>
    </div>

    <!-- URL BAR -->
    <div class="ubar">
      <select class="usel" id="srcSel" onchange="srcChange()">
        <option value="direct">🎬 Direct URL (.mp4/.mkv)</option>
        <option value="youtube">▶ YouTube</option>
        <option value="gdrive">☁ Google Drive</option>
        <option value="iframe">🌐 Any Website</option>
      </select>
      <input class="uinp" id="urlInp" placeholder="Paste direct .mp4 / .mkv / .webm / .m3u8 URL here…"/>
      <button class="ulbtn" onclick="loadVid()">▶ Load</button>
    </div>

    <!-- Track / subtitle row (visible only for direct player) -->
    <div class="subrow" id="subrow">
      📄 Subtitles &amp; Audio:
      <span id="trkInfo" style="font-size:.7rem;color:var(--mute)">Load a video to see tracks</span>
      <button class="sfbtn" onclick="document.getElementById('subFile').click()">+ External .SRT/.VTT</button>
      <input type="file" id="subFile" accept=".srt,.vtt" onchange="loadSubFile(this)"/>
      <span id="subName" style="color:var(--ok);font-size:.72rem"></span>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="side" id="sidebar">
    <div class="stabs">
      <button class="stab on" onclick="stab('chat')">💬 Chat</button>
      <button class="stab"    onclick="stab('users')">👥 Users</button>
    </div>
    <div class="span on" id="p-chat">
      <div class="cmsg" id="msgs"></div>
      <div class="rxbar">
        <button class="rxb" onclick="doRx('😂')">😂</button>
        <button class="rxb" onclick="doRx('❤️')">❤️</button>
        <button class="rxb" onclick="doRx('🔥')">🔥</button>
        <button class="rxb" onclick="doRx('😮')">😮</button>
        <button class="rxb" onclick="doRx('👏')">👏</button>
        <button class="rxb" onclick="doRx('😢')">😢</button>
        <button class="rxb" onclick="doRx('💀')">💀</button>
        <button class="rxb" onclick="doRx('🍿')">🍿</button>
      </div>
      <div class="carea">
        <input class="cinp" id="cinp" placeholder="Say something…" maxlength="300"
          onkeydown="if(event.key==='Enter')sendChat()"/>
        <button class="csnd" onclick="sendChat()">➤</button>
      </div>
    </div>
    <div class="span" id="p-users">
      <div class="ulist" id="ulist"></div>
      <div class="vbar" id="vbar">
        <div class="vdot"></div>
        <span style="font-size:.78rem;font-weight:600">Voice Active</span>
        <span id="vcnt" style="margin-left:auto;font-size:.74rem;color:var(--mute)"></span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
'use strict';

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */
const roomId   = location.pathname.split('/room/')[1];
const username = sessionStorage.getItem('username') || 'Guest'+(Math.random()*9999|0);
let   myId     = null;
let   users    = {};

// video sync
let syncLocked   = false;
let syncTimer    = null;
let seekDebounce = null;

// screen share
let isScrSharing = false;
let scrStream    = null;
const scrPeers   = {};   // peerId → RTCPeerConnection

// voice
let voiceOn      = false;
let voiceMuted   = false;
let localMic     = null; // raw MediaStream from getUserMedia
let audioCtx     = null; // Web Audio context for processing
let processedDest= null; // processed stream destination
const voicePeers = {};   // peerId → RTCPeerConnection
const remAudio   = {};   // peerId → <audio>

// subtitles
let extCues  = [];
let extSubOn = false;

/* ═══════════════════════════════════════════════════════════════
   ICE CONFIG — includes public TURN relay as fallback
   (without TURN, peers behind symmetric NAT/mobile 4G often fail)
═══════════════════════════════════════════════════════════════ */
const ICE = { iceServers:[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'stun:stun2.l.google.com:19302'},
  {urls:'stun:stun3.l.google.com:19302'},
  // Free public TURN — replace with your own for production
  {urls:'turn:openrelay.metered.ca:80',  username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443', username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443', username:'openrelayproject',credential:'openrelayproject',credentialType:'password'},
]};

/* ═══════════════════════════════════════════════════════════════
   SOCKET
═══════════════════════════════════════════════════════════════ */
const sock = io({transports:['websocket','polling']});

sock.on('connect',()=>{
  myId = sock.id;
  document.getElementById('codeSpan').textContent = roomId;
  sock.emit('join-room',{roomId,username});
});
sock.on('connect_error',()=>toast('Connection error – retrying…','e'));

sock.on('room-state',({users:u,videoState:vs,messages,screenSharer})=>{
  users={};
  u.forEach(x=>users[x.id]=x);

/* ═══════════════════════════════════════════════════════════════
   SCREEN SHARE
═══════════════════════════════════════════════════════════════ */
async function toggleScreen(){ isScrSharing?stopScreen():await startScreen(); }

async function startScreen(){
  try{
    scrStream = await navigator.mediaDevices.getDisplayMedia({
      video:{frameRate:{ideal:60,max:60},width:{ideal:1920},height:{ideal:1080}},
      audio:{echoCancellation:false,noiseSuppression:false,sampleRate:48000}
    });
    isScrSharing=true;
    hideAll();
    const pv=document.getElementById('prvVid');
    pv.srcObject=scrStream; pv.style.display='block';
    document.getElementById('sbar').classList.add('show');
    document.getElementById('qbdg').classList.add('show');
    document.getElementById('sBtn').classList.add('on');
    document.getElementById('sBtn').innerHTML='⏹ <span class="lbl">Sharing</span>';
    sock.emit('screen-share-start',{roomId});
    Object.keys(users).filter(id=>id!==myId).forEach(id=>setTimeout(()=>scrOffer(id),300));
    scrStream.getVideoTracks()[0].addEventListener('ended',stopScreen);
    toast('Screen sharing started 🖥️','i');
  }catch(e){
    toast(e.name==='NotAllowedError'?'Permission denied':'Could not share screen','e');
  }
}

function stopScreen(){
  if(scrStream){scrStream.getTracks().forEach(t=>t.stop());scrStream=null;}
  isScrSharing=false;
  Object.keys(scrPeers).forEach(id=>{try{scrPeers[id].close()}catch(e){};delete scrPeers[id]});
  const pv=document.getElementById('prvVid'); pv.srcObject=null; pv.style.display='none';
  document.getElementById('sbar').classList.remove('show');
  document.getElementById('qbdg').classList.remove('show');
  document.getElementById('sBtn').classList.remove('on');
  document.getElementById('sBtn').innerHTML='🖥️ <span class="lbl">Share</span>';
  document.getElementById('ph').style.display='flex';
  sock.emit('screen-share-stop',{roomId});
  toast('Screen sharing stopped');
}

async function scrOffer(targetId){
  if(scrPeers[targetId]) try{scrPeers[targetId].close()}catch(e){}
  const pc=new RTCPeerConnection(ICE);
  scrPeers[targetId]=pc;

  scrStream.getTracks().forEach(track=>{
    const sender=pc.addTrack(track,scrStream);
    try{
      const p=sender.getParameters();
      if(!p.encodings?.length) p.encodings=[{}];
      p.encodings[0].maxBitrate=12_000_000;
      p.encodings[0].maxFramerate=60;
      sender.setParameters(p);
    }catch(e){}
  });

  pc.onicecandidate=e=>{if(e.candidate)sock.emit('webrtc-ice',{targetId,candidate:e.candidate})};
  pc.oniceconnectionstatechange=()=>{
    if(pc.iceConnectionState==='failed') pc.restartIce();
  };

  try{
    const offer=await pc.createOffer();
    await pc.setLocalDescription(offer);
    sock.emit('webrtc-offer',{targetId,offer:pc.localDescription,roomId});
  }catch(e){console.warn('scrOffer',e)}
}

async function scrAnswer(offer,fromId){
  if(scrPeers[fromId]) try{scrPeers[fromId].close()}catch(e){}
  const pc=new RTCPeerConnection(ICE);
  scrPeers[fromId]=pc;

  pc.onicecandidate=e=>{if(e.candidate)sock.emit('webrtc-ice',{targetId:fromId,candidate:e.candidate})};
  pc.oniceconnectionstatechange=()=>{if(pc.iceConnectionState==='failed')pc.restartIce()};

  // BUG FIX: create a MediaStream and add each incoming track individually
  // DO NOT rely on event.streams[] — it is often empty in Chrome/Safari
  const ms=new MediaStream();
  const sv=document.getElementById('scrVid');
  pc.ontrack=e=>{
    e.track.addEventListener('unmute',()=>{});  // keep track alive
    ms.addTrack(e.track);
    sv.srcObject=ms;
    sv.style.display='block';
    sv.play().catch(()=>{});
    document.getElementById('prvVid').style.display='none';
    document.getElementById('ifr').style.display='none';
    document.getElementById('plyr').classList.remove('show');
    document.getElementById('ph').style.display='none';
    document.getElementById('qbdg').classList.add('show');
    document.getElementById('fsbtn').classList.add('show');
  };

  try{
    await pc.setRemoteDescription(offer);
    const ans=await pc.createAnswer();
    await pc.setLocalDescription(ans);
    sock.emit('webrtc-answer',{targetId:fromId,answer:pc.localDescription});
  }catch(e){console.warn('scrAnswer',e)}
}

function scrFull(){
  const el=document.getElementById('scrVid');
  (el.requestFullscreen||el.webkitRequestFullscreen).call(el);
}

/* ═══════════════════════════════════════════════════════════════
   VOICE CHAT
   Key fixes:
   1. Web Audio pipeline: getUserMedia → high-pass filter → compressor → output
      This removes low-frequency rumble, normalises volume, prevents clipping.
   2. Echo: echoCancellation=true in constraints + we NEVER feed our own
      processed audio back to ourselves (no loopback).
   3. Connection: tracks added to PC BEFORE createOffer, so SDP is correct.
   4. Rejoin: killVoice cleans everything; makeVoicePC always creates fresh PC.
   5. Glare prevention: only the lexicographically smaller socket ID sends the offer.
═══════════════════════════════════════════════════════════════ */
async function toggleVoice(){ voiceOn?stopVoice():await startVoice(); }

async function startVoice(){
  try{
    // Step 1: get raw mic stream
    localMic = await navigator.mediaDevices.getUserMedia({
      audio:{
        echoCancellation:true,    // browser-level echo cancellation
        noiseSuppression:true,    // remove background noise
        autoGainControl:true,     // normalise volume automatically
        sampleRate:48000,
        channelCount:1,           // mono is critical — stereo doubles echo chance
      },
      video:false
    });

    // Step 2: run through Web Audio for extra quality + echo safety
    audioCtx = new AudioContext({sampleRate:48000});
    const src = audioCtx.createMediaStreamSource(localMic);

    // High-pass filter: removes low-frequency hum (fans, AC units)
    const hpf = audioCtx.createBiquadFilter();
    hpf.type='highpass'; hpf.frequency.value=80;

    // Dynamics compressor: prevents clipping, keeps voice level
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value=-24;
    comp.knee.value=30;
    comp.ratio.value=12;
    comp.attack.value=0.003;
    comp.release.value=0.25;

    // Destination stream — this is what we send to peers
    processedDest = audioCtx.createMediaStreamDestination();
    src.connect(hpf);
    hpf.connect(comp);
    comp.connect(processedDest);
    // NOTE: we do NOT connect to audioCtx.destination — that would cause echo

    voiceOn=true;
    document.getElementById('vBtn').classList.add('grn');
    document.getElementById('vBtn').innerHTML='🎙️ <span class="lbl">In Voice</span>';
    document.getElementById('mBtn').style.display='flex';
    document.getElementById('vbar').classList.add('show');

    sock.emit('voice-joined',{roomId});
    toast('Voice chat active 🎙️','i');
  }catch(e){
    toast(e.name==='NotAllowedError'?'Mic permission denied':'Cannot access mic','e');
  }
}

function stopVoice(){
  if(audioCtx){audioCtx.close().catch(()=>{}); audioCtx=null; processedDest=null;}
  if(localMic){localMic.getTracks().forEach(t=>t.stop()); localMic=null;}
  voiceOn=false; voiceMuted=false;
  Object.keys(voicePeers).forEach(killVoice);
  document.getElementById('vBtn').classList.remove('grn');
  document.getElementById('vBtn').innerHTML='🎙️ <span class="lbl">Voice</span>';
  document.getElementById('mBtn').style.display='none';
  document.getElementById('mBtn').classList.remove('red');
  document.getElementById('mBtn').innerHTML='🔇 <span class="lbl">Mute</span>';
  document.getElementById('vbar').classList.remove('show');
  sock.emit('voice-left',{roomId});
  toast('Left voice chat');
}

function toggleMute(){
  if(!localMic) return;
  voiceMuted=!voiceMuted;
  // Mute/unmute by enabling/disabling raw mic tracks
  localMic.getAudioTracks().forEach(t=>t.enabled=!voiceMuted);
  const b=document.getElementById('mBtn');
  b.innerHTML=voiceMuted?'🔇 <span class="lbl">Unmute</span>':'🎤 <span class="lbl">Mute</span>';
  b.classList.toggle('red',voiceMuted);
  toast(voiceMuted?'Mic muted 🔇':'Mic active 🎤');
}

function makeVoicePC(peerId){
  // Always start fresh
  killVoice(peerId);
  const pc=new RTCPeerConnection(ICE);
  voicePeers[peerId]=pc;

  // Add processed mic track to the PC BEFORE creating offer/answer
  // This ensures the SDP includes audio in both directions
  if(processedDest){
    processedDest.stream.getAudioTracks().forEach(t=>pc.addTrack(t,processedDest.stream));
  }

  pc.onicecandidate=e=>{if(e.candidate)sock.emit('voice-ice',{targetId:peerId,candidate:e.candidate})};

  pc.oniceconnectionstatechange=()=>{
    console.log(`voice [${peerId.slice(-4)}] ICE: ${pc.iceConnectionState}`);
    if(pc.iceConnectionState==='failed'){
      console.log('ICE failed → restartIce');
      pc.restartIce();
    }
    if(pc.iceConnectionState==='disconnected'){
      setTimeout(()=>{
        if(voicePeers[peerId]===pc && pc.iceConnectionState==='disconnected')
          pc.restartIce();
      },4000);
    }
  };

  pc.ontrack=e=>{
    // BUG FIX: build stream from individual track — do NOT use event.streams[0]
    const inStream=new MediaStream([e.track]);
    playRemoteAudio(inStream,peerId);
  };

  return pc;
}

async function voiceOffer(peerId){
  if(voicePeers[peerId]) return; // already have connection
  const pc=makeVoicePC(peerId);
  try{
    const offer=await pc.createOffer({offerToReceiveAudio:true});
    await pc.setLocalDescription(offer);
    sock.emit('voice-offer',{targetId:peerId,offer:pc.localDescription});
  }catch(e){console.warn('voiceOffer',e);killVoice(peerId);}
}

async function voiceAnswer(offer,fromId){
  // BUG FIX: tear down any existing connection before creating a new one
  // Previous code stored the PC in voicePeers THEN called makeVoicePC which deleted it —
  // so the voice-answer handler couldn't find the PC. Now we just make fresh PC here.
  const pc=makeVoicePC(fromId);
  try{
    await pc.setRemoteDescription(offer);
    const ans=await pc.createAnswer();
    await pc.setLocalDescription(ans);
    sock.emit('voice-answer',{targetId:fromId,answer:pc.localDescription});
  }catch(e){console.warn('voiceAnswer',e);killVoice(fromId);}
}

function playRemoteAudio(stream,peerId){
  // Remove old element
  if(remAudio[peerId]){remAudio[peerId].remove(); delete remAudio[peerId];}

  const a=document.createElement('audio');
  a.srcObject=stream;
  a.autoplay=true;
  a.volume=1.0;
  // CRITICAL: never set a.muted=true — that silences all incoming audio
  a.style.display='none';
  document.body.appendChild(a);
  remAudio[peerId]=a;

  // Force play — some browsers block autoplay
  const tryPlay=()=>a.play().catch(err=>{
    if(err.name==='NotAllowedError'){
      // Autoplay blocked — resume on first user interaction
      document.addEventListener('click',()=>a.play().catch(()=>{}),{once:true});
      document.addEventListener('keydown',()=>a.play().catch(()=>{}),{once:true});
    }
  });
  tryPlay();
  renderUsers();
}

function killVoice(id){
  if(voicePeers[id]){try{voicePeers[id].close()}catch(e){}; delete voicePeers[id];}
  if(remAudio[id]){remAudio[id].remove(); delete remAudio[id];}
}

function killPeer(id){
  if(scrPeers[id]){try{scrPeers[id].close()}catch(e){}; delete scrPeers[id];}
  killVoice(id);
}

/* ═══════════════════════════════════════════════════════════════
   DIRECT PLAYER
   BUG FIX: All event listeners are registered ONCE using named
   functions stored in a cleanup object. On each new video load we
   remove old listeners first, then add new ones. This prevents the
   "stacking" bug where play/pause fired 2, 4, 8 times causing the
   video to immediately toggle back after syncing.
═══════════════════════════════════════════════════════════════ */
const vidListeners = {}; // name → handler fn stored for removal

function startPlayer(url, startTime, shouldPlay){
  const vid  = document.getElementById('vid');
  const plyr = document.getElementById('plyr');

  // ── Step 1: Remove ALL old event listeners to prevent stacking ──
  Object.entries(vidListeners).forEach(([evt,fn])=>{
    vid.removeEventListener(evt,fn);
  });
  // Clear the object
  for(const k in vidListeners) delete vidListeners[k];

  // ── Step 2: Reset subtitle state ──
  extCues=[]; extSubOn=false;
  document.getElementById('sutxt').textContent='';
  document.getElementById('subSel').innerHTML='<option value="off">Subs: Off</option>';
  document.getElementById('subName').textContent='';
  document.getElementById('trkInfo').textContent='Loading…';

  // ── Step 3: Load new video ──
  plyr.classList.add('show');
  vid.src = url;
  vid.load();

  // ── Step 4: Register fresh listeners ──

  // loadedmetadata — fired once when video metadata is available
  const onMeta = () => {
    if(startTime>0) vid.currentTime = startTime;
    if(shouldPlay) vid.play().catch(()=>{});
    else playIcon(false);
    buildTracks();
    updTime(); updSeek();
  };
  vid.addEventListener('loadedmetadata', onMeta, {once:true});
  // (once:true means it auto-removes after firing — don't add to vidListeners)

  // timeupdate — continuous progress updates
  const onTime = () => { updTime(); updSeek(); renderExtSub(vid.currentTime); };
  vidListeners['timeupdate'] = onTime;
  vid.addEventListener('timeupdate', onTime);

  // progress — buffer update
  const onProg = () => updBuf();
  vidListeners['progress'] = onProg;
  vid.addEventListener('progress', onProg);

  // play — user pressed play
  const onPlay = () => {
    if(syncLocked) return;
    playIcon(true);
    sock.emit('video-play',{roomId,currentTime:vid.currentTime});
  };
  vidListeners['play'] = onPlay;
  vid.addEventListener('play', onPlay);

  // pause — user pressed pause
  const onPause = () => {
    if(syncLocked) return;
    playIcon(false);
    sock.emit('video-pause',{roomId,currentTime:vid.currentTime});
  };
  vidListeners['pause'] = onPause;
  vid.addEventListener('pause', onPause);

  // seeked — fires once when seek is complete (NOT 'seeking' which fires continuously)
  const onSeeked = () => {
    if(syncLocked) return;
    clearTimeout(seekDebounce);
    seekDebounce=setTimeout(()=>sock.emit('video-seek',{roomId,currentTime:vid.currentTime}),350);
  };
  vidListeners['seeked'] = onSeeked;
  vid.addEventListener('seeked', onSeeked);

  // click on video = play/pause
  const onClick = () => pPlay();
  vidListeners['click'] = onClick;
  vid.addEventListener('click', onClick);
}

/* ── Track selectors (audio + subtitles) ── */
function buildTracks(){
  const vid    = document.getElementById('vid');
  const subSel = document.getElementById('subSel');
  const audSel = document.getElementById('audSel');
  let   info   = [];

  // Audio tracks (Chrome only — works for multi-audio mp4/mkv)
  if(vid.audioTracks && vid.audioTracks.length>1){
    audSel.innerHTML='';
    [...vid.audioTracks].forEach((t,i)=>{
      const o=document.createElement('option');
      o.value=i;
      o.textContent=t.label||t.language||(i===0?'Japanese':'English') ;// common dual-audio labelling
      audSel.appendChild(o);
    });
    audSel.style.display='block';
    info.push(`🔊 ${vid.audioTracks.length} audio tracks`);
  } else {
    audSel.style.display='none';
  }

  // Text tracks (internal subtitles in mp4/webm)
  const tt=[...vid.textTracks];
  if(tt.length>0){
    tt.forEach(t=>t.mode='hidden'); // hide browser default rendering

    tt.forEach((t,i)=>{
      const o=document.createElement('option');
      o.value='int:'+i;
      o.textContent='📝 '+(t.label||t.language||'Sub '+(i+1));
      subSel.appendChild(o);

      // cuechange renders our overlay
      t.addEventListener('cuechange',()=>{
        if(document.getElementById('subSel').value!=='int:'+i) return;
        const cue=t.activeCues?.[0];
        document.getElementById('sutxt').textContent=cue?(cue.text||cue.data||''):'';
      });
    });
    info.push(`📝 ${tt.length} subtitle track(s)`);
  }

  document.getElementById('trkInfo').textContent =
    info.length>0 ? info.join(' · ') : 'No internal tracks — use external SRT/VTT';
}

function pSub(val){
  const vid=document.getElementById('vid');
  [...vid.textTracks].forEach(t=>t.mode='hidden');
  document.getElementById('sutxt').textContent='';
  extSubOn=false;

  if(val==='off') return;
  if(val.startsWith('int:')){
    const i=parseInt(val.split(':')[1]);
    // keep hidden mode so our cuechange handler renders it
    if(vid.textTracks[i]) vid.textTracks[i].mode='hidden';
    return;
  }
  if(val==='ext') extSubOn=true;
}

function pAudio(idx){
  const vid=document.getElementById('vid');
  if(!vid.audioTracks) return;
  [...vid.audioTracks].forEach((t,i)=>t.enabled=(i===+idx));
}

function loadSubFile(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    const txt=e.target.result;
    extCues=file.name.toLowerCase().endsWith('.srt')?parseSRT(txt):parseVTT(txt);
    extSubOn=true;
    const sel=document.getElementById('subSel');
    let opt=sel.querySelector('option[value="ext"]');
    if(!opt){opt=document.createElement('option');opt.value='ext';sel.appendChild(opt);}
    opt.textContent='📄 '+file.name;
    sel.value='ext';
    document.getElementById('subName').textContent='✅ '+file.name;
    toast('Subtitles loaded ✅','i');
  };
  r.readAsText(file,'UTF-8');
}

function renderExtSub(t){
  if(!extSubOn||!extCues.length) return;
  const c=extCues.find(x=>t>=x.s&&t<=x.e);
  document.getElementById('sutxt').textContent=c?c.t:'';
}

function parseSRT(txt){
  return txt.replace(/\r\n/g,'\n').trim().split(/\n\n+/).map(b=>{
    const ls=b.split('\n'); if(ls.length<3) return null;
    const m=ls[1].match(/(\d+:\d+:\d+[,.]\d+)\s*-->\s*(\d+:\d+:\d+[,.]\d+)/);
    if(!m) return null;
    return {s:srtT(m[1]),e:srtT(m[2]),t:ls.slice(2).join('\n').replace(/<[^>]+>/g,'')};
  }).filter(Boolean);
}
function srtT(s){const[h,mn,r]=s.split(':'),[sec,ms]=r.replace(',','.').split('.');return+h*3600+ +mn*60+ +sec+ +ms/1000;}
function parseVTT(txt){
  return txt.replace(/\r\n/g,'\n').replace(/^WEBVTT[^\n]*/,'').trim().split(/\n\n+/).map(b=>{
    const ls=b.split('\n').filter(l=>l.trim()&&!l.startsWith('NOTE'));
    const tl=ls.find(l=>l.includes('-->'));
    if(!tl) return null;
    const m=tl.match(/([\d:.]+)\s*-->\s*([\d:.]+)/);
    if(!m) return null;
    return {s:vttT(m[1]),e:vttT(m[2]),t:ls.slice(ls.indexOf(tl)+1).join('\n').replace(/<[^>]+>/g,'')};
  }).filter(Boolean);
}
function vttT(s){const p=s.split(':').map(Number);return p.length===3?p[0]*3600+p[1]*60+p[2]:p[0]*60+p[1];}

/* ── Seek bar (mouse + touch) ── */
const seekEl=document.getElementById('seekEl');
let seekDrag=false;
function seekPct(e){
  const vid=document.getElementById('vid'); if(!vid.duration) return;
  const r=seekEl.getBoundingClientRect();
  const cx=(e.touches?e.touches[0].clientX:e.clientX);
  vid.currentTime=Math.max(0,Math.min(1,(cx-r.left)/r.width))*vid.duration;
}
seekEl.addEventListener('mousedown', e=>{seekDrag=true;seekPct(e)});
document.addEventListener('mousemove',e=>{if(seekDrag)seekPct(e)});
document.addEventListener('mouseup',  ()=>seekDrag=false);
seekEl.addEventListener('touchstart',e=>{seekDrag=true;seekPct(e)},{passive:true});
seekEl.addEventListener('touchmove', e=>{if(seekDrag)seekPct(e)},{passive:true});
seekEl.addEventListener('touchend',  ()=>seekDrag=false);

function updSeek(){
  const vid=document.getElementById('vid'); if(!vid.duration) return;
  const p=(vid.currentTime/vid.duration)*100;
  document.getElementById('sfil').style.width=p+'%';
  document.getElementById('sthm').style.left=p+'%';
}
function updBuf(){
  const vid=document.getElementById('vid');
  if(!vid.duration||!vid.buffered.length) return;
  document.getElementById('sbuf').style.width=((vid.buffered.end(vid.buffered.length-1)/vid.duration)*100)+'%';
}
function updTime(){
  const vid=document.getElementById('vid');
  document.getElementById('tlbl').textContent=fmt(vid.currentTime)+' / '+fmt(vid.duration||0);
}
function fmt(s){
  if(!s||isNaN(s)) return '0:00';
  const h=Math.floor(s/3600),m=Math.floor(s%3600/60),ss=Math.floor(s%60);
  return h?`${h}:${pad(m)}:${pad(ss)}`:`${m}:${pad(ss)}`;
}
function pad(n){return String(n).padStart(2,'0')}

function lockSync(fn){
  syncLocked=true; clearTimeout(syncTimer); fn();
  syncTimer=setTimeout(()=>syncLocked=false,900);
}
function getVid(){
  const v=document.getElementById('vid');
  return document.getElementById('plyr').classList.contains('show')&&v.src?v:null;
}

/* ── Player controls ── */
function pPlay (){ const v=document.getElementById('vid'); if(!v.src)return; v.paused?v.play().catch(()=>{}):v.pause(); }
function pSkip (s){ const v=document.getElementById('vid'); if(!v.src)return; v.currentTime=Math.max(0,Math.min(v.duration||0,v.currentTime+s)); }
function pVol  (val){ document.getElementById('vid').volume=val; document.getElementById('volIco').textContent=val==0?'🔇':val<.5?'🔈':'🔊'; }
function pMute (){ const v=document.getElementById('vid'); v.muted=!v.muted; document.getElementById('volIco').textContent=v.muted?'🔇':'🔊'; document.getElementById('volSl').value=v.muted?0:v.volume; }
function pSpeed(v){ document.getElementById('vid').playbackRate=parseFloat(v); }
function pFull (){ const w=document.getElementById('plyr'); (w.requestFullscreen||w.webkitRequestFullscreen).call(w); }
function playIcon(pl){ document.getElementById('pip').setAttribute('d',pl?'M6 19h4V5H6v14zm8-14v14h4V5h-4z':'M8 5v14l11-7z'); }

/* ═══════════════════════════════════════════════════════════════
   CHAT
═══════════════════════════════════════════════════════════════ */
function sendChat(){
  const i=document.getElementById('cinp'),t=i.value.trim();
  if(!t)return; sock.emit('chat-message',{roomId,message:t}); i.value='';
}
function addMsg(m,mine){
  const c=document.getElementById('msgs'),d=document.createElement('div');
  d.className='msg'+(mine?' me':'');
  const ts=new Date(m.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  d.innerHTML=`<div class="mh"><span>${m.avatar||'🦊'}</span><span class="mn">${esc(m.username)}</span><span class="mt">${ts}</span></div><div class="mb">${esc(m.text)}</div>`;
  c.appendChild(d); scrollMsgs();
}
function sysMsg(t){
  const c=document.getElementById('msgs'),d=document.createElement('div');
  d.className='sys'; d.textContent=t; c.appendChild(d); scrollMsgs();
}
function scrollMsgs(){const c=document.getElementById('msgs');c.scrollTop=c.scrollHeight;}
function doRx(e){sock.emit('reaction',{roomId,emoji:e});flyRx(e);}
function flyRx(e){
  const el=document.createElement('div');el.className='rxp';el.textContent=e;
  el.style.left=(Math.random()*(window.innerWidth-60)+20)+'px';
  el.style.top=(window.innerHeight-110)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),2100);
}

/* ═══════════════════════════════════════════════════════════════
   USERS LIST
═══════════════════════════════════════════════════════════════ */
function renderUsers(){
  const list=document.getElementById('ulist'); list.innerHTML='';
  const inV=Object.keys(remAudio).length+(voiceOn?1:0);
  document.getElementById('vcnt').textContent=inV?`${inV} in voice`:'';

  Object.values(users).forEach(u=>{
    const me=u.id===myId;
    const mic=(me&&voiceOn)||!!remAudio[u.id];
    const scr=me&&isScrSharing;
    const d=document.createElement('div'); d.className='ui';
    d.innerHTML=`<div class="uav">${u.avatar||'🦊'}</div>
      <div class="unm">${esc(u.username)}${me?' (You)':''}</div>
      <div class="ubdg">
        ${me?'<span class="bdg bh">HOST</span>':''}
        ${mic?'<span class="bdg bm">🎙️</span>':''}
        ${scr?'<span class="bdg bs">🖥️</span>':''}
      </div>`;
    list.appendChild(d);
  });
}

   UI HELPERS
═══════════════════════════════════════════════════════════════ */
function stab(t){
  document.querySelectorAll('.stab').forEach((b,i)=>b.classList.toggle('on',(t==='chat'&&i===0)||(t==='users'&&i===1)));
  document.getElementById('p-chat').classList.toggle('on',t==='chat');
  document.getElementById('p-users').classList.toggle('on',t==='users');
}
function toggleSide(){ document.getElementById('sidebar').classList.toggle('open'); }
function cpLink(){
  navigator.clipboard.writeText(location.href)
    .then(()=>toast('Invite link copied! 🔗'))
    .catch(()=>toast('Copy URL from address bar','i'));
}
function leaveRoom(){ stopScreen(); stopVoice(); sock.disconnect(); location.href='/'; }
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' '+type:'');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),3200);
}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function ytId(u){const m=u.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/)([^&\n?#]+)/);return m?m[1]:null;}
function gdId(u){const m=u.match(/\/d\/([a-zA-Z0-9_-]+)/);return m?m[1]:null;}

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) return;
  if(e.code==='Space'){e.preventDefault();pPlay();}
  else if(e.code==='ArrowLeft') pSkip(-10);
  else if(e.code==='ArrowRight')pSkip(10);
  else if(e.code==='KeyM')      pMute();
  else if(e.code==='KeyF')      pFull();
});

window.addEventListener('beforeunload',()=>{stopScreen();stopVoice();});

document.addEventListener('click',e=>{
  const sb=document.getElementById('sidebar');
  if(window.innerWidth<=768&&sb.classList.contains('open')&&!sb.contains(e.target)&&!e.target.closest('.mob'))
    sb.classList.remove('open');
});

// No username → prompt
if(!sessionStorage.getItem('username')){
  const n=prompt('Enter your name to join:');
  if(n?.trim()){sessionStorage.setItem('username',n.trim());location.reload();}
  else location.href='/';
}

srcChange(); // init placeholder text
