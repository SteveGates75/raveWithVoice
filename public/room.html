<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
'use strict';

const RID  = location.pathname.split('/room/')[1];
const NAME = sessionStorage.getItem('wt-name') || ('Guest' + (Math.random() * 9999 | 0));

let ME = null;
let users = {};

let scrOn = false, scrStream = null;
const scrPC = {};

let micOn = false, micStream = null;
const voicePC = {};
const remAudio = {};

// ✅ FIXED ICE (NO FAKE TURN)
const ICE = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' }
  ],
  iceCandidatePoolSize: 10
};

const socket = io();

socket.on('connect', () => {
  ME = socket.id;
  socket.emit('join', { roomId: RID, name: NAME });
});

socket.on('users', list => {
  users = {};
  list.forEach(u => users[u.id] = u);
});

// ================= SCREEN SHARE =================

async function toggleScr() {
  scrOn ? stopScr() : await startScr();
}

async function startScr() {
  try {
    scrStream = await navigator.mediaDevices.getDisplayMedia({
      video: {
        frameRate: { ideal: 30, max: 30 },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      },
      audio: true
    });

    scrOn = true;

    const pv = document.getElementById('prvVid');
    pv.srcObject = scrStream;
    pv.muted = true;
    pv.setAttribute('playsinline', '');
    await pv.play().catch(()=>{});

    pv.style.display = 'block';

    socket.emit('scr-start');

    Object.keys(users).forEach(id => {
      if (id !== ME) setTimeout(()=>scrOffer(id), 200);
    });

    scrStream.getVideoTracks()[0].onended = stopScr;

  } catch (e) {
    console.error(e);
  }
}

function stopScr() {
  if (scrStream) scrStream.getTracks().forEach(t => t.stop());
  scrOn = false;

  Object.values(scrPC).forEach(x => x.pc.close());
}

async function scrOffer(id) {
  const pc = new RTCPeerConnection(ICE);
  scrPC[id] = { pc };

  scrStream.getTracks().forEach(t => pc.addTrack(t, scrStream));

  pc.onicecandidate = e => {
    if (e.candidate) socket.emit('signal', { to:id, kind:'s-ice', data:e.candidate });
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'failed') pc.restartIce();
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  socket.emit('signal', { to:id, kind:'s-offer', data:offer });
}

socket.on('signal', async ({ from, kind, data }) => {

  // ===== SCREEN =====
  if (kind === 's-offer') {
    const pc = new RTCPeerConnection(ICE);
    scrPC[from] = { pc };

    pc.onicecandidate = e => {
      if (e.candidate) socket.emit('signal', { to:from, kind:'s-ice', data:e.candidate });
    };

    pc.ontrack = ({ track }) => {
      const ms = new MediaStream([track]);
      const v = document.getElementById('scrVid');

      v.srcObject = ms;
      v.muted = true;
      v.setAttribute('playsinline','');
      v.play().catch(()=>{});

      v.style.display = 'block';
    };

    await pc.setRemoteDescription(data);
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);

    socket.emit('signal', { to:from, kind:'s-answer', data:ans });
  }

  if (kind === 's-answer') {
    await scrPC[from].pc.setRemoteDescription(data);
  }

  if (kind === 's-ice') {
    scrPC[from]?.pc.addIceCandidate(data);
  }

  // ===== VOICE =====
  if (kind === 'v-offer') {
    const pc = createVoicePC(from);
    await pc.setRemoteDescription(data);

    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);

    socket.emit('signal', { to:from, kind:'v-answer', data:ans });
  }

  if (kind === 'v-answer') {
    await voicePC[from].setRemoteDescription(data);
  }

  if (kind === 'v-ice') {
    voicePC[from]?.addIceCandidate(data);
  }

});

// ================= VOICE =================

async function toggleVoice(){
  micOn ? stopVoice() : await startVoice();
}

async function startVoice(){
  micStream = await navigator.mediaDevices.getUserMedia({ audio:true });
  micOn = true;

  socket.emit('voice-join');

  Object.keys(users).forEach(id=>{
    if(id!==ME) voiceOffer(id);
  });
}

function stopVoice(){
  micStream?.getTracks().forEach(t=>t.stop());
  micOn=false;
}

function createVoicePC(id){
  const pc = new RTCPeerConnection(ICE);
  voicePC[id] = pc;

  micStream.getTracks().forEach(t=>pc.addTrack(t,micStream));

  pc.ontrack = ({ track }) => {
    const audio = document.createElement('audio');
    audio.srcObject = new MediaStream([track]);
    audio.autoplay = true;
    audio.playsInline = true;
    audio.muted = true;

    document.body.appendChild(audio);
    remAudio[id] = audio;

    audio.play().then(()=>{
      audio.muted = false;
    }).catch(()=>{});
  };

  pc.onicecandidate = e=>{
    if(e.candidate) socket.emit('signal',{to:id,kind:'v-ice',data:e.candidate});
  };

  pc.onconnectionstatechange = ()=>{
    if(pc.connectionState==='failed') pc.restartIce();
  };

  return pc;
}

async function voiceOffer(id){
  const pc = createVoicePC(id);

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  socket.emit('signal',{to:id,kind:'v-offer',data:offer});
}

// 🔥 IMPORTANT: UNLOCK AUDIO (mobile fix)
document.addEventListener('click', ()=>{
  Object.values(remAudio).forEach(a=>{
    a.muted=false;
    a.play().catch(()=>{});
  });
});

// ================= INIT =================

if (!sessionStorage.getItem('wt-name')) {
  const n = prompt('Enter your name');
  if (n) { sessionStorage.setItem('wt-name', n); location.reload(); }
}

</script>
