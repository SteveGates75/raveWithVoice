<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>WatchTogether</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a0f;--sur:#13131a;--card:#1a1a25;
  --acc:#7c3aed;--acc2:#06b6d4;--acc3:#f59e0b;
  --txt:#f0f0f8;--mut:#6b6b8a;--brd:#2a2a3a;
  --ok:#10b981;--err:#ef4444;--sw:320px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Space Grotesk',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── TOP BAR ─────────────────────────────────── */
.bar{display:flex;align-items:center;gap:.6rem;padding:.55rem .9rem;background:var(--sur);border-bottom:1px solid var(--brd);flex-shrink:0;flex-wrap:wrap}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:2px;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.code-pill{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.4);border-radius:8px;padding:.28rem .65rem;font-size:.75rem;font-weight:700;color:var(--acc2);cursor:pointer;white-space:nowrap}
.acts{display:flex;gap:.35rem;margin-left:auto;flex-wrap:wrap}
.btn{display:flex;align-items:center;gap:.3rem;padding:.38rem .7rem;border:1px solid var(--brd);border-radius:8px;background:var(--card);color:var(--txt);font-family:'Space Grotesk',sans-serif;font-size:.76rem;font-weight:600;cursor:pointer;transition:all .16s;white-space:nowrap;user-select:none}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn.on {background:var(--acc);border-color:var(--acc);color:#fff}
.btn.grn{background:var(--ok);border-color:var(--ok);color:#fff}
.btn.red{background:var(--err);border-color:var(--err);color:#fff}
.mob{display:none}

/* ── LAYOUT ──────────────────────────────────── */
.wrap{display:flex;flex:1;overflow:hidden}

/* ── VIDEO AREA ──────────────────────────────── */
.vsec{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#000;min-width:0}
.vbox{flex:1;position:relative;background:#000;overflow:hidden}

/* placeholder */
.ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.9rem;background:radial-gradient(ellipse at center,#1a1a2e 0%,#000 70%);z-index:1}
.ph-ico{font-size:3.2rem}
.ph h2{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:2px;color:var(--mut)}
.ph p{color:var(--mut);font-size:.82rem;text-align:center;padding:0 1.5rem;max-width:360px;line-height:1.6}

/* iframe / screen share els */
#ifr{width:100%;height:100%;border:none;display:none;position:absolute;inset:0}
#scrVid{width:100%;height:100%;object-fit:contain;display:none;background:#000;position:absolute;inset:0}
#prvVid{width:100%;height:100%;object-fit:contain;display:none;background:#000;position:absolute;inset:0}

/* ── CUSTOM DIRECT PLAYER ────────────────────── */
#plyr{position:absolute;inset:0;display:none;flex-direction:column;background:#000}
#plyr.show{display:flex}
#vid{width:100%;flex:1;background:#000;object-fit:contain;cursor:pointer;min-height:0;display:block}

/* subtitle overlay */
.sub-ov{position:absolute;bottom:82px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:15;max-width:90%;width:max-content}
.sub-txt{display:inline-block;background:rgba(0,0,0,.82);color:#fff;font-size:clamp(.9rem,2.3vw,1.15rem);padding:.22rem .7rem;border-radius:5px;line-height:1.5;white-space:pre-wrap;max-width:100%}

/* controls */
.ctrl{flex-shrink:0;background:linear-gradient(0deg,rgba(0,0,0,.97),rgba(0,0,0,.5));padding:.45rem .7rem .38rem;display:flex;flex-direction:column;gap:.38rem;user-select:none}
.srow{display:flex;align-items:center;gap:.45rem}
.tlbl{font-size:.7rem;color:#ccc;white-space:nowrap;min-width:95px}
.sw{flex:1;position:relative;height:20px;display:flex;align-items:center;cursor:pointer}
.st{width:100%;height:4px;background:rgba(255,255,255,.18);border-radius:4px;position:relative;transition:height .12s}
.sw:hover .st{height:6px}
.sb{height:100%;background:rgba(255,255,255,.28);border-radius:4px;position:absolute;left:0;top:0;width:0}
.sf{height:100%;background:var(--acc);border-radius:4px;position:absolute;left:0;top:0;width:0}
.sth{width:13px;height:13px;background:#fff;border-radius:50%;position:absolute;top:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 4px rgba(0,0,0,.5);transition:transform .13s}
.sw:hover .sth{transform:translate(-50%,-50%) scale(1.35)}
.crow{display:flex;align-items:center;gap:.35rem;flex-wrap:wrap}
.cb{background:none;border:none;color:#fff;cursor:pointer;padding:.18rem .28rem;border-radius:4px;font-size:.95rem;display:flex;align-items:center;justify-content:center;min-width:26px;transition:background .13s}
.cb:hover{background:rgba(255,255,255,.14)}
.cb svg{width:17px;height:17px;fill:#fff}
.vw{display:flex;align-items:center;gap:.28rem}
.vs{width:68px;height:4px;accent-color:var(--acc);cursor:pointer}
.csel{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:6px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.7rem;padding:.18rem .35rem;cursor:pointer;max-width:110px}
.csel option{background:#1a1a25;color:#fff}
.sp{flex:1}

/* overlay badges/buttons */
.fs-btn{position:absolute;top:.65rem;right:.65rem;z-index:25;background:rgba(0,0,0,.68);border:1px solid rgba(255,255,255,.22);border-radius:8px;color:#fff;font-size:.76rem;padding:.32rem .65rem;cursor:pointer;display:none;font-family:'Space Grotesk',sans-serif;font-weight:600;align-items:center;gap:.3rem}
.fs-btn.show{display:flex}
.scr-bar{display:none;position:absolute;bottom:.75rem;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);border:1px solid var(--brd);border-radius:10px;padding:.38rem .85rem;gap:.65rem;align-items:center;font-size:.8rem;z-index:25;white-space:nowrap}
.scr-bar.show{display:flex}
.qbadge{position:absolute;top:.65rem;left:.65rem;z-index:25;background:rgba(0,0,0,.72);border:1px solid var(--ok);color:var(--ok);padding:.16rem .44rem;border-radius:5px;font-size:.66rem;font-weight:700;display:none}
.qbadge.show{display:block}

/* ── URL BAR ─────────────────────────────────── */
.ubar{display:flex;gap:.4rem;padding:.5rem .7rem;background:var(--sur);border-top:1px solid var(--brd);flex-wrap:wrap;flex-shrink:0}
.usel{padding:.4rem .55rem;background:var(--card);border:1px solid var(--brd);border-radius:8px;color:var(--txt);font-family:'Space Grotesk',sans-serif;font-size:.76rem;cursor:pointer}
.uinp{flex:1;padding:.4rem .65rem;background:var(--card);border:1px solid var(--brd);border-radius:8px;color:var(--txt);font-family:'Space Grotesk',sans-serif;font-size:.8rem;min-width:0}
.uinp:focus{outline:none;border-color:var(--acc)}
.ulbtn{padding:.4rem .85rem;background:var(--acc);border:none;border-radius:8px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;white-space:nowrap}
.ulbtn:hover{background:#6d28d9}

/* subtitle panel */
.subrow{display:none;align-items:center;gap:.5rem;padding:.32rem .7rem;background:rgba(6,182,212,.07);border-top:1px solid rgba(6,182,212,.18);font-size:.76rem;color:var(--acc2);flex-shrink:0;flex-wrap:wrap}
.subrow.show{display:flex}
.sfbtn{background:rgba(6,182,212,.13);border:1px solid rgba(6,182,212,.38);border-radius:6px;color:var(--acc2);font-family:'Space Grotesk',sans-serif;font-size:.73rem;font-weight:600;padding:.22rem .55rem;cursor:pointer}
#subFile{display:none}
.trk-panel{display:none;gap:.4rem;align-items:center;flex-wrap:wrap}
.trk-panel.show{display:flex}

/* ── SIDEBAR ─────────────────────────────────── */
.side{width:var(--sw);display:flex;flex-direction:column;background:var(--sur);border-left:1px solid var(--brd);flex-shrink:0}
.stabs{display:flex;border-bottom:1px solid var(--brd)}
.stab{flex:1;padding:.65rem;border:none;background:transparent;color:var(--mut);font-family:'Space Grotesk',sans-serif;font-size:.76rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.stab.on{color:var(--acc2);border-bottom-color:var(--acc2)}
.span{display:none;flex:1;flex-direction:column;overflow:hidden}
.span.on{display:flex}

/* users list */
.ulist{flex:1;overflow-y:auto;padding:.7rem}
.ui{display:flex;align-items:center;gap:.6rem;padding:.45rem .6rem;border-radius:10px;margin-bottom:.38rem;background:var(--card);border:1px solid var(--brd);transition:border-color .25s}
.ui.spk{border-color:var(--ok);background:rgba(16,185,129,.07)}
.uav{width:33px;height:33px;border-radius:50%;background:rgba(124,58,237,.2);display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0}
.unm{font-weight:600;font-size:.86rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ubdg{display:flex;gap:.22rem;flex-shrink:0}
.bdg{font-size:.63rem;padding:.1rem .32rem;border-radius:4px;font-weight:700}
.b-host{background:rgba(245,158,11,.2);color:var(--acc3)}
.b-mic {background:rgba(16,185,129,.2);color:var(--ok)}
.b-scr {background:rgba(6,182,212,.2);color:var(--acc2)}
.vbar{display:none;align-items:center;gap:.45rem;padding:.42rem .7rem;background:rgba(16,185,129,.07);border-top:1px solid rgba(16,185,129,.22);font-size:.78rem;flex-shrink:0}
.vbar.show{display:flex}
.vdot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:vdot 1.1s ease infinite}
@keyframes vdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}

/* chat */
.cmsg{flex:1;overflow-y:auto;padding:.6rem;display:flex;flex-direction:column;gap:.45rem}
.msg{background:var(--card);border:1px solid var(--brd);border-radius:11px 11px 11px 3px;padding:.45rem .6rem}
.msg.me{background:rgba(124,58,237,.11);border-color:rgba(124,58,237,.28);border-radius:11px 11px 3px 11px}
.mh{display:flex;align-items:center;gap:.3rem;margin-bottom:.18rem}
.mn{font-size:.7rem;font-weight:700;color:var(--acc2)}
.mt{font-size:.6rem;color:var(--mut);margin-left:auto}
.mb{font-size:.83rem;line-height:1.5;word-break:break-word}
.sys{text-align:center;font-size:.7rem;color:var(--mut);padding:.18rem 0}
.rxbar{display:flex;gap:.32rem;padding:.42rem .62rem;border-top:1px solid var(--brd);overflow-x:auto;flex-shrink:0}
.rxb{border:1px solid var(--brd);background:var(--card);border-radius:8px;padding:.22rem .46rem;font-size:.95rem;cursor:pointer;transition:transform .13s}
.rxb:hover{transform:scale(1.3)}
.carea{display:flex;gap:.4rem;padding:.55rem;border-top:1px solid var(--brd);flex-shrink:0}
.cinp{flex:1;padding:.46rem .62rem;background:var(--card);border:1px solid var(--brd);border-radius:10px;color:var(--txt);font-family:'Space Grotesk',sans-serif;font-size:.83rem}
.cinp:focus{outline:none;border-color:var(--acc)}
.csnd{padding:.46rem .75rem;background:var(--acc);border:none;border-radius:10px;color:#fff;cursor:pointer;font-size:.95rem}
.csnd:hover{background:#6d28d9}

/* toast */
.toast{position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%) translateY(120px);background:var(--ok);color:#fff;padding:.55rem 1.15rem;border-radius:100px;font-weight:600;font-size:.81rem;transition:transform .28s ease;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.e{background:var(--err)}.toast.i{background:var(--acc)}

/* reaction pop */
.rxp{position:fixed;font-size:2rem;pointer-events:none;animation:fly 2s ease forwards;z-index:9998}
@keyframes fly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-210px) scale(.4)}}

/* scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:10px}

/* mobile */
@media(max-width:768px){
  .mob{display:flex}
  .side{position:fixed;right:-100%;top:0;bottom:0;z-index:50;width:min(320px,100vw);transition:right .28s}
  .side.open{right:0}
  .btn .lbl{display:none}
  .vs{width:50px}
}
@media(max-width:420px){.logo{font-size:1.1rem}}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="bar">
  <div class="logo">WatchTogether</div>
  <div class="code-pill" onclick="copyLink()" title="Copy invite link">🔗 <span id="codeSpan">------</span></div>
  <div class="acts">
    <button class="btn" id="vBtn" onclick="toggleVoice()">🎙️ <span class="lbl">Voice</span></button>
    <button class="btn" id="mBtn" onclick="toggleMute()" style="display:none">🔇 <span class="lbl">Mute</span></button>
    <button class="btn" id="sBtn" onclick="toggleScreen()">🖥️ <span class="lbl">Share</span></button>
    <button class="btn mob" onclick="toggleSide()">💬 <span class="lbl">Chat</span></button>
    <button class="btn" onclick="leaveRoom()" style="border-color:var(--err);color:var(--err)">🚪</button>
  </div>
</div>

<!-- MAIN -->
<div class="wrap">
  <!-- VIDEO -->
  <div class="vsec">
    <div class="vbox" id="vbox">
      <div class="ph" id="ph">
        <div class="ph-ico">🎬</div>
        <h2>No Video Playing</h2>
        <p>Paste a direct video URL (.mp4 .mkv .webm) and click Load.<br>For Netflix / Prime, use Screen Share instead.</p>
      </div>

      <iframe id="ifr" allowfullscreen allow="autoplay;fullscreen;encrypted-media;picture-in-picture"></iframe>
      <video id="scrVid" autoplay playsinline></video>
      <video id="prvVid" autoplay playsinline muted></video>

      <!-- ── DIRECT PLAYER ── -->
      <div id="plyr">
        <video id="vid" playsinline crossorigin="anonymous"></video>

        <!-- subtitle overlay -->
        <div class="sub-ov"><span class="sub-txt" id="subTxt"></span></div>

        <!-- player controls -->
        <div class="ctrl">
          <div class="srow">
            <span class="tlbl" id="tlbl">0:00 / 0:00</span>
            <div class="sw" id="seekEl">
              <div class="st">
                <div class="sb" id="sbuf"></div>
                <div class="sf" id="sfil"></div>
                <div class="sth" id="sthumb"></div>
              </div>
            </div>
          </div>
          <div class="crow">
            <button class="cb" onclick="pPlay()" title="Play/Pause (Space)">
              <svg><path id="pip" d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="cb" onclick="pSkip(-10)" title="Back 10s">⏮10</button>
            <button class="cb" onclick="pSkip(10)"  title="Fwd 10s">10⏭</button>
            <div class="vw">
              <button class="cb" id="volIco" onclick="pMute()" title="Mute (M)">🔊</button>
              <input type="range" class="vs" id="volSlider" min="0" max="1" step="0.02" value="1"
                oninput="pVol(this.value)"/>
            </div>
            <div class="sp"></div>
            <select class="csel" onchange="pSpeed(this.value)" title="Speed">
              <option value="0.5">0.5×</option><option value="0.75">0.75×</option>
              <option value="1" selected>1×</option><option value="1.25">1.25×</option>
              <option value="1.5">1.5×</option><option value="2">2×</option>
            </select>
            <!-- Audio track selector — filled dynamically -->
            <select class="csel" id="audSel" onchange="pAudio(this.value)" title="Audio Track" style="display:none">
            </select>
            <!-- Subtitle track selector — filled dynamically -->
            <select class="csel" id="subSel" onchange="pSub(this.value)" title="Subtitles">
              <option value="off">Subs: Off</option>
            </select>
            <button class="cb" onclick="pFull()" title="Fullscreen (F)">
              <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- overlays -->
      <button class="fs-btn" id="fsbtn" onclick="scrFull()">⛶ Fullscreen</button>
      <div class="qbadge" id="qbadge">1080p 60fps</div>
      <div class="scr-bar" id="scrBar">
        🖥️ Sharing your screen
        <button class="btn red" onclick="stopScreen()" style="padding:.22rem .55rem;font-size:.73rem">⏹ Stop</button>
      </div>
    </div>

    <!-- URL BAR -->
    <div class="ubar">
      <select class="usel" id="srcSel" onchange="srcChange()">
        <option value="direct">🎬 Direct URL (.mp4/.mkv)</option>
        <option value="youtube">▶ YouTube</option>
        <option value="gdrive">☁ Google Drive</option>
        <option value="iframe">🌐 Any Website</option>
      </select>
      <input class="uinp" id="urlInp" placeholder="Paste direct .mp4 / .mkv / .webm / .m3u8 URL here…"/>
      <button class="ulbtn" onclick="loadVid()">▶ Load</button>
    </div>

    <!-- SUBTITLE / TRACK PANEL (shown only for direct player) -->
    <div class="subrow" id="subrow">
      <span>📄 Subtitles &amp; Audio:</span>
      <div class="trk-panel" id="trkPanel">
        <!-- populated when video loads -->
      </div>
      <button class="sfbtn" onclick="document.getElementById('subFile').click()">+ External .SRT/.VTT</button>
      <input type="file" id="subFile" accept=".srt,.vtt" onchange="loadSubFile(this)"/>
      <span id="subName" style="color:var(--ok);font-size:.73rem"></span>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="side" id="sidebar">
    <div class="stabs">
      <button class="stab on" onclick="stab('chat')">💬 Chat</button>
      <button class="stab"    onclick="stab('users')">👥 Users</button>
    </div>

    <div class="span on" id="p-chat">
      <div class="cmsg" id="msgs"></div>
      <div class="rxbar">
        <button class="rxb" onclick="rx('😂')">😂</button>
        <button class="rxb" onclick="rx('❤️')">❤️</button>
        <button class="rxb" onclick="rx('🔥')">🔥</button>
        <button class="rxb" onclick="rx('😮')">😮</button>
        <button class="rxb" onclick="rx('👏')">👏</button>
        <button class="rxb" onclick="rx('😢')">😢</button>
        <button class="rxb" onclick="rx('💀')">💀</button>
        <button class="rxb" onclick="rx('🍿')">🍿</button>
      </div>
      <div class="carea">
        <input class="cinp" id="cinp" placeholder="Say something…" maxlength="300"
          onkeydown="if(event.key==='Enter')send()"/>
        <button class="csnd" onclick="send()">➤</button>
      </div>
    </div>

    <div class="span" id="p-users">
      <div class="ulist" id="ulist"></div>
      <div class="vbar" id="vbar">
        <div class="vdot"></div>
        <span style="font-size:.8rem;font-weight:600">Voice Active</span>
        <span id="vcnt" style="margin-left:auto;font-size:.76rem;color:var(--mut)"></span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
'use strict';

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
const roomId   = location.pathname.split('/room/')[1];
const username = sessionStorage.getItem('username') || 'Guest' + (Math.random()*9999|0);
let   myId     = null;
let   users    = {};

// Video sync
let syncLocked   = false;
let syncTimer    = null;
let seekDebounce = null;

// Screen share
let isScrSharing  = false;
let scrStream     = null;
const scrPeers    = {};   // peerId → RTCPeerConnection

// Voice chat (full mesh)
let voiceOn       = false;
let voiceMuted    = false;
let localMic      = null; // MediaStream
const voicePeers  = {};   // peerId → RTCPeerConnection
const remAudio    = {};   // peerId → <audio>

// Subtitles
let extCues   = [];
let extSubOn  = false;

// ══════════════════════════════════════════════════════════════
// ICE CONFIG
// We use multiple STUN servers. For production, add a TURN server
// if users are behind symmetric NAT (corporate/mobile networks).
// Free TURN: https://www.metered.ca/tools/openrelay/
// ══════════════════════════════════════════════════════════════
const ICE = { iceServers: [
  { urls: 'stun:stun.l.google.com:19302'  },
  { urls: 'stun:stun1.l.google.com:19302' },
  { urls: 'stun:stun2.l.google.com:19302' },
  { urls: 'stun:stun3.l.google.com:19302' },
  { urls: 'stun:stun4.l.google.com:19302' },
  // Public TURN relay (rate-limited but free — replace with your own for reliability)
  { urls: 'turn:openrelay.metered.ca:80',  username:'openrelayproject', credential:'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443', username:'openrelayproject', credential:'openrelayproject' },
]};

// ══════════════════════════════════════════════════════════════
// SOCKET
// ══════════════════════════════════════════════════════════════
const sock = io({ transports:['websocket','polling'] });

sock.on('connect', () => {
  myId = sock.id;
  document.getElementById('codeSpan').textContent = roomId;
  sock.emit('join-room', { roomId, username });
});
sock.on('connect_error', () => toast('Connection error – retrying…','e'));

// SCREEN SHARE
// ══════════════════════════════════════════════════════════════
async function toggleScreen(){ isScrSharing ? stopScreen() : await startScreen(); }

async function startScreen(){
  try {
    scrStream = await navigator.mediaDevices.getDisplayMedia({
      video:{ frameRate:{ideal:60,max:60}, width:{ideal:1920}, height:{ideal:1080} },
      audio:{ echoCancellation:false, noiseSuppression:false, sampleRate:48000 }
    });
    isScrSharing = true;
    hideAll();
    const pv = document.getElementById('prvVid');
    pv.srcObject = scrStream; pv.style.display='block';
    document.getElementById('scrBar').classList.add('show');
    document.getElementById('qbadge').classList.add('show');
    document.getElementById('sBtn').classList.add('on');
    document.getElementById('sBtn').innerHTML='⏹ <span class="lbl">Sharing</span>';

    sock.emit('screen-share-start', {roomId});
    Object.keys(users).filter(id=>id!==myId).forEach(id => setTimeout(()=>scrOffer(id),200));
    scrStream.getVideoTracks()[0].addEventListener('ended', stopScreen);
    toast('Screen sharing started 🖥️','i');
  } catch(e){
    toast(e.name==='NotAllowedError'?'Permission denied':'Could not share screen','e');
  }
}

function stopScreen(){
  if(scrStream){ scrStream.getTracks().forEach(t=>t.stop()); scrStream=null; }
  isScrSharing=false;
  Object.keys(scrPeers).forEach(id=>{try{scrPeers[id].close()}catch(e){}; delete scrPeers[id]});
  const pv=document.getElementById('prvVid'); pv.srcObject=null; pv.style.display='none';
  document.getElementById('scrBar').classList.remove('show');
  document.getElementById('qbadge').classList.remove('show');
  document.getElementById('sBtn').classList.remove('on');
  document.getElementById('sBtn').innerHTML='🖥️ <span class="lbl">Share</span>';
  document.getElementById('ph').style.display='flex';
  sock.emit('screen-share-stop',{roomId});
  toast('Screen sharing stopped');
}

// ── createOffer as host ──────────────────────────────────────
async function scrOffer(targetId){
  if(scrPeers[targetId]) try{scrPeers[targetId].close()}catch(e){}

  const pc = new RTCPeerConnection(ICE);
  scrPeers[targetId] = pc;

  // FIX: add transceivers BEFORE creating offer so the receiver knows what to expect
  scrStream.getTracks().forEach(track => {
    const sender = pc.addTrack(track, scrStream);
    // Request max quality encoding
    const rtp = sender.getParameters();
    if(!rtp.encodings||!rtp.encodings.length) rtp.encodings=[{}];
    rtp.encodings[0].maxBitrate   = 12_000_000; // 12 Mbps
    rtp.encodings[0].maxFramerate = 60;
    sender.setParameters(rtp).catch(()=>{});
  });

  pc.onicecandidate = e => { if(e.candidate) sock.emit('webrtc-ice',{targetId,candidate:e.candidate}); };
  pc.oniceconnectionstatechange = () => {
    console.log('scr-ice',targetId,pc.iceConnectionState);
    if(pc.iceConnectionState==='failed') pc.restartIce();
    if(pc.iceConnectionState==='disconnected') setTimeout(()=>{ if(scrPeers[targetId]===pc&&pc.iceConnectionState==='disconnected') pc.restartIce(); },3000);
  };

  // FIX: use onnegotiationneeded instead of manually creating offer to avoid timing issues
  await new Promise(resolve => {
    pc.onnegotiationneeded = async () => {
      try {
        await pc.setLocalDescription(await pc.createOffer());
        sock.emit('webrtc-offer',{targetId, offer:pc.localDescription, roomId});
      } catch(e){ console.warn('scrOffer',e); }
      resolve();
    };
  });
}

// ── answer as viewer ─────────────────────────────────────────
async function scrAnswer(offer, fromId){
  if(scrPeers[fromId]) try{scrPeers[fromId].close()}catch(e){}

  const pc = new RTCPeerConnection(ICE);
  scrPeers[fromId] = pc;

  pc.onicecandidate = e => { if(e.candidate) sock.emit('webrtc-ice',{targetId:fromId,candidate:e.candidate}); };
  pc.oniceconnectionstatechange = () => {
    console.log('scr-ice-viewer',fromId,pc.iceConnectionState);
    if(pc.iceConnectionState==='failed') pc.restartIce();
  };

  // FIX: build stream from individual tracks as they arrive
  // Many black screen bugs come from relying on event.streams which can be empty
  const ms = new MediaStream();
  const sv  = document.getElementById('scrVid');

  pc.ontrack = e => {
    ms.addTrack(e.track);
    if(sv.srcObject !== ms){
      sv.srcObject = ms;
    }
    sv.style.display='block';
    sv.play().catch(()=>{});
    document.getElementById('prvVid').style.display='none';
    document.getElementById('ifr').style.display='none';
    document.getElementById('plyr').classList.remove('show');
    document.getElementById('ph').style.display='none';
    document.getElementById('qbadge').classList.add('show');
    document.getElementById('fsbtn').classList.add('show');
  };

  try {
    await pc.setRemoteDescription(offer);
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);
    sock.emit('webrtc-answer',{targetId:fromId, answer:pc.localDescription});
  } catch(e){ console.warn('scrAnswer',e); }
}

function scrFull(){
  const el=document.getElementById('scrVid');
  (el.requestFullscreen||el.webkitRequestFullscreen).call(el);
}

async function toggleVoice(){ voiceOn ? stopVoice() : await startVoice(); }

async function startVoice(){
  try {
    // Get mic with good quality settings
    localMic = await navigator.mediaDevices.getUserMedia({
      audio:{
        echoCancellation:true,
        noiseSuppression:true,
        autoGainControl:true,
        sampleRate:48000,
        channelCount:1,   // mono prevents echo when talking simultaneously
      },
      video:false
    });
    voiceOn = true;

    document.getElementById('vBtn').classList.add('grn');
    document.getElementById('vBtn').innerHTML='🎙️ <span class="lbl">In Voice</span>';
    document.getElementById('mBtn').style.display='flex';
    document.getElementById('vbar').classList.add('show');

    // Tell server we joined voice — server sends back list of existing voice peers
    sock.emit('voice-joined',{roomId});
    toast('Voice chat active 🎙️','i');
  } catch(e){
    toast(e.name==='NotAllowedError'?'Mic permission denied':'Cannot access mic','e');
  }
}

function stopVoice(){
  if(localMic){ localMic.getTracks().forEach(t=>t.stop()); localMic=null; }
  voiceOn=false; voiceMuted=false;
  Object.keys(voicePeers).forEach(killVoice);
  document.getElementById('vBtn').classList.remove('grn');
  document.getElementById('vBtn').innerHTML='🎙️ <span class="lbl">Voice</span>';
  document.getElementById('mBtn').style.display='none';
  document.getElementById('mBtn').classList.remove('red');
  document.getElementById('mBtn').innerHTML='🔇 <span class="lbl">Mute</span>';
  document.getElementById('vbar').classList.remove('show');
  sock.emit('voice-left',{roomId});
  toast('Left voice chat');
}

function toggleMute(){
  if(!localMic) return;
  voiceMuted=!voiceMuted;
  localMic.getAudioTracks().forEach(t=>t.enabled=!voiceMuted);
  const b=document.getElementById('mBtn');
  b.innerHTML=voiceMuted?'🔇 <span class="lbl">Unmute</span>':'🎤 <span class="lbl">Mute</span>';
  b.classList.toggle('red',voiceMuted);
  toast(voiceMuted?'Mic muted 🔇':'Mic active 🎤');
}

// Make RTCPeerConnection for voice with mic track already added
function makeVoicePC(targetId){
  if(voicePeers[targetId]) killVoice(targetId);
  const pc = new RTCPeerConnection(ICE);
  voicePeers[targetId] = pc;

  // Add our mic BEFORE offer so SDP includes audio direction
  if(localMic) localMic.getAudioTracks().forEach(t => pc.addTrack(t, localMic));

  pc.onicecandidate = e => { if(e.candidate) sock.emit('voice-ice',{targetId,candidate:e.candidate}); };
  pc.oniceconnectionstatechange = () => {
    console.log('voice-ice',targetId,pc.iceConnectionState);
    if(pc.iceConnectionState==='failed'){
      console.log('ICE failed, restarting…');
      pc.restartIce();
    }
    if(['disconnected','closed'].includes(pc.iceConnectionState)){
      setTimeout(()=>{ if(voicePeers[targetId]===pc) killVoice(targetId); },5000);
    }
  };

  pc.ontrack = e => {
    // Receive remote audio — build stream from individual track
    const stream = new MediaStream([e.track]);
    playAudio(stream, targetId);
  };

  return pc;
}

async function voiceOffer(targetId){
  if(voicePeers[targetId]) return; // already connected
  const pc = makeVoicePC(targetId);
  try {
    // FIX: use addTransceiver to ensure audio sendrecv even before tracks arrive
    // This prevents the "one-way audio" bug
    const offer = await pc.createOffer({ offerToReceiveAudio:true });
    await pc.setLocalDescription(offer);
    sock.emit('voice-offer',{targetId, offer:pc.localDescription});
  } catch(e){ console.warn('voiceOffer',e); killVoice(targetId); }
}

async function voiceAnswer(offer, fromId){
  if(voicePeers[fromId]) killVoice(fromId);
  const pc = makeVoicePC(fromId);
  try {
    await pc.setRemoteDescription(offer);
    const ans = await pc.createAnswer();
    await pc.setLocalDescription(ans);
    sock.emit('voice-answer',{targetId:fromId, answer:pc.localDescription});
  } catch(e){ console.warn('voiceAnswer',e); killVoice(fromId); }
}

function playAudio(stream, peerId){
  if(remAudio[peerId]) remAudio[peerId].remove();
  const a=document.createElement('audio');
  a.autoplay=true; a.srcObject=stream; a.volume=1;
  a.style.display='none'; document.body.appendChild(a);
  remAudio[peerId]=a;
  // FIX: never mute the audio element — only the sender's track.enabled
  // Some browsers auto-pause audio. Force play after user gesture.
  const tryPlay = () => a.play().catch(()=>{});
  tryPlay();
  document.addEventListener('click', tryPlay, {once:true});
  renderUsers();
}

function killVoice(id){
  if(voicePeers[id]){ try{voicePeers[id].close()}catch(e){}; delete voicePeers[id]; }
  if(remAudio[id])  { remAudio[id].remove(); delete remAudio[id]; }
  renderUsers();
}

function killPeer(id){
  if(scrPeers[id]){ try{scrPeers[id].close()}catch(e){}; delete scrPeers[id]; }
  killVoice(id);
}

// ── Build internal audio + subtitle track selectors ──────────
// This is the KEY FIX for "no dual audio / no internal subs"
// The <video> element exposes:
//   - vid.audioTracks  (Chrome-only but works for mkv/mp4 with multiple audio)
//   - vid.textTracks   (works for mp4/mkv with embedded subs, and <track> elements)
// For MKV/MKV files we use a workaround: add <track> elements with crossorigin
function buildTrackSelectors(){
  const vid    = document.getElementById('vid');
  const panel  = document.getElementById('trkPanel');
  const subSel = document.getElementById('subSel');
  const audSel = document.getElementById('audSel');
  panel.innerHTML='';
  panel.classList.add('show');

  // ── AUDIO TRACKS ──────────────────────────────────────────
  // audioTracks API — Chrome only
  if(vid.audioTracks && vid.audioTracks.length > 1){
    audSel.innerHTML='';
    const lbl=document.createElement('span');
    lbl.textContent='🔊 Audio:'; lbl.style.fontSize='.73rem'; lbl.style.color='var(--acc2)';
    panel.appendChild(lbl);

    [...vid.audioTracks].forEach((t,i)=>{
      const opt=document.createElement('option');
      opt.value=i;
      opt.textContent=t.label||t.language||`Track ${i+1}`;
      audSel.appendChild(opt);
    });
    audSel.style.display='block';
    panel.appendChild(audSel);
    toast(`${vid.audioTracks.length} audio tracks found`,'i');
  } else {
    audSel.style.display='none';
  }

  // ── TEXT TRACKS (internal subtitles) ────────────────────
  // textTracks works for:
  //   • .mp4 with embedded subtitle streams (mov_text codec)
  //   • .webm with embedded WebVTT
  //   • <track> elements we inject ourselves
  // For .mkv SSA/ASS/SRT we need a library — we handle this with
  // a manual parse approach below.
  const ttracks = [...vid.textTracks];

  if(ttracks.length > 0){
    // disable browser auto-rendering so we render ourselves
    ttracks.forEach(t=>{ t.mode='hidden'; });

    ttracks.forEach((t,i)=>{
      const opt=document.createElement('option');
      opt.value='internal:'+i;
      opt.textContent=`📝 ${t.label||t.language||'Sub '+(i+1)}`;
      subSel.appendChild(opt);
    });
    toast(`${ttracks.length} subtitle track(s) found`,'i');

    // Listen for cue changes on all tracks
    ttracks.forEach((t,i)=>{
      t.addEventListener('cuechange', ()=>{
        if(subSel.value !== 'internal:'+i) return;
        const cue=t.activeCues?.[0];
        document.getElementById('subTxt').textContent = cue ? (cue.text||cue.data||'') : '';
      });
    });
  }

  // Show hint if nothing found
  if((!vid.audioTracks||vid.audioTracks.length<=1) && ttracks.length===0){
    const hint=document.createElement('span');
    hint.textContent='No internal tracks found. Load external .SRT/.VTT above.';
    hint.style.fontSize='.7rem'; hint.style.color='var(--mut)';
    panel.appendChild(hint);
  }
}

// ── Subtitle track selection ─────────────────────────────────
function pSub(val){
  const vid=document.getElementById('vid');
  // hide all built-in tracks
  [...vid.textTracks].forEach(t=>{ t.mode='hidden'; });
  document.getElementById('subTxt').textContent='';
  extSubOn=false;

  if(val==='off') return;

  if(val.startsWith('internal:')){
    const idx=parseInt(val.split(':')[1]);
    const tt=vid.textTracks[idx];
    if(tt) tt.mode='hidden'; // keep hidden so our cuechange listener renders it
    return;
  }

  if(val==='ext'){
    extSubOn=true; // external SRT/VTT rendering
  }
}

// ── Audio track selection ────────────────────────────────────
function pAudio(idx){
  const vid=document.getElementById('vid');
  if(!vid.audioTracks) return;
  [...vid.audioTracks].forEach((t,i)=>{ t.enabled=(i===+idx); });
}

// ── External subtitle file ────────────────────────────────────
function loadSubFile(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{
    const txt=e.target.result;
    extCues=file.name.toLowerCase().endsWith('.srt') ? parseSRT(txt) : parseVTT(txt);
    extSubOn=true;

    // Add option to sub selector
    const sel=document.getElementById('subSel');
    let opt=sel.querySelector('option[value="ext"]');
    if(!opt){ opt=document.createElement('option'); opt.value='ext'; sel.appendChild(opt); }
    opt.textContent='📄 '+file.name;
    sel.value='ext';

    document.getElementById('subName').textContent='✅ '+file.name;
    toast('External subtitles loaded ✅','i');
  };
  r.readAsText(file,'UTF-8');
}

function renderExtSub(t){
  if(!extSubOn||!extCues.length){ return; }
  const c=extCues.find(x=>t>=x.s&&t<=x.e);
  document.getElementById('subTxt').textContent=c?c.t:'';
}

// SRT parser
function parseSRT(txt){
  return txt.replace(/\r\n/g,'\n').trim().split(/\n\n+/).map(b=>{
    const ls=b.split('\n'); if(ls.length<3) return null;
    const m=ls[1].match(/(\d+:\d+:\d+[,.]\d+)\s*-->\s*(\d+:\d+:\d+[,.]\d+)/);
    if(!m) return null;
    return {s:srtT(m[1]),e:srtT(m[2]),t:ls.slice(2).join('\n').replace(/<[^>]+>/g,'')};
  }).filter(Boolean);
}
function srtT(s){ const[h,mn,r]=s.split(':'),[sec,ms]=r.replace(',','.').split('.'); return +h*3600+ +mn*60+ +sec+ +ms/1000; }

// VTT parser
function parseVTT(txt){
  return txt.replace(/\r\n/g,'\n').replace(/^WEBVTT[^\n]*/,'').trim().split(/\n\n+/).map(b=>{
    const ls=b.split('\n').filter(l=>l.trim()&&!l.startsWith('NOTE'));
    const tl=ls.find(l=>l.includes('-->'));
    if(!tl) return null;
    const m=tl.match(/([\d:.]+)\s*-->\s*([\d:.]+)/);
    if(!m) return null;
    return {s:vttT(m[1]),e:vttT(m[2]),t:ls.slice(ls.indexOf(tl)+1).join('\n').replace(/<[^>]+>/g,'')};
  }).filter(Boolean);
}
function vttT(s){ const p=s.split(':').map(Number); return p.length===3?p[0]*3600+p[1]*60+p[2]:p[0]*60+p[1]; }

// ── Seek bar ─────────────────────────────────────────────────
const seekEl=document.getElementById('seekEl');
let seekDrag=false;
function seekAt(e){
  const vid=document.getElementById('vid'); if(!vid.duration) return;
  const r=seekEl.getBoundingClientRect();
  const cx=(e.touches?e.touches[0].clientX:e.clientX);
  vid.currentTime=Math.max(0,Math.min(1,(cx-r.left)/r.width))*vid.duration;
}
seekEl.addEventListener('mousedown', e=>{seekDrag=true;seekAt(e)});
document.addEventListener('mousemove',e=>{if(seekDrag)seekAt(e)});
document.addEventListener('mouseup',  ()=>seekDrag=false);
seekEl.addEventListener('touchstart',e=>{seekDrag=true;seekAt(e)},{passive:true});
seekEl.addEventListener('touchmove', e=>{if(seekDrag)seekAt(e)},{passive:true});
seekEl.addEventListener('touchend',  ()=>seekDrag=false);

function updSeek(){
  const vid=document.getElementById('vid'); if(!vid.duration) return;
  const p=(vid.currentTime/vid.duration)*100;
  document.getElementById('sfil').style.width=p+'%';
  document.getElementById('sthumb').style.left=p+'%';
}
function updBuf(){
  const vid=document.getElementById('vid');
  if(!vid.duration||!vid.buffered.length) return;
  document.getElementById('sbuf').style.width=((vid.buffered.end(vid.buffered.length-1)/vid.duration)*100)+'%';
}
function updTime(){
  const vid=document.getElementById('vid');
  document.getElementById('tlbl').textContent=fmt(vid.currentTime)+' / '+fmt(vid.duration||0);
}
function fmt(s){
  if(!s||isNaN(s)) return '0:00';
  const h=Math.floor(s/3600),m=Math.floor(s%3600/60),ss=Math.floor(s%60);
  return h?`${h}:${pad(m)}:${pad(ss)}`:`${m}:${pad(ss)}`;
}
function pad(n){return String(n).padStart(2,'0')}

// ── Sync helpers ─────────────────────────────────────────────
function lockSync(fn){
  syncLocked=true; clearTimeout(syncTimer); fn();
  syncTimer=setTimeout(()=>{syncLocked=false;},900);
}
function getVid(){
  const v=document.getElementById('vid');
  return document.getElementById('plyr').classList.contains('show')&&v.src?v:null;
}

// ── Player control functions ──────────────────────────────────
function pPlay(){ const v=document.getElementById('vid'); if(!v.src)return; v.paused?v.play().catch(()=>{}):v.pause(); }
function pSkip(s){ const v=document.getElementById('vid'); if(!v.src)return; v.currentTime=Math.max(0,Math.min(v.duration||0,v.currentTime+s)); }
function pVol(val){ document.getElementById('vid').volume=val; document.getElementById('volIco').textContent=val==0?'🔇':val<0.5?'🔈':'🔊'; }
function pMute(){ const v=document.getElementById('vid'); v.muted=!v.muted; document.getElementById('volIco').textContent=v.muted?'🔇':'🔊'; document.getElementById('volSlider').value=v.muted?0:v.volume; }
function pSpeed(v){ document.getElementById('vid').playbackRate=parseFloat(v); }
function pFull(){ const w=document.getElementById('plyr'); (w.requestFullscreen||w.webkitRequestFullscreen).call(w); }
function pPlayIcon(pl){ document.getElementById('pip').setAttribute('d',pl?'M6 19h4V5H6v14zm8-14v14h4V5h-4z':'M8 5v14l11-7z'); }

// ══════════════════════════════════════════════════════════════
// CHAT
// ══════════════════════════════════════════════════════════════
function send(){
  const i=document.getElementById('cinp'),t=i.value.trim();
  if(!t)return; sock.emit('chat-message',{roomId,message:t}); i.value='';
}
function addMsg(m,mine){
  const c=document.getElementById('msgs'),d=document.createElement('div');
  d.className='msg'+(mine?' me':'');
  const t=new Date(m.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  d.innerHTML=`<div class="mh"><span>${m.avatar||'🦊'}</span><span class="mn">${esc(m.username)}</span><span class="mt">${t}</span></div><div class="mb">${esc(m.text)}</div>`;
  c.appendChild(d); scrollMsgs();
}
function sysMsg(t){ const c=document.getElementById('msgs'),d=document.createElement('div'); d.className='sys'; d.textContent=t; c.appendChild(d); scrollMsgs(); }
function scrollMsgs(){ const c=document.getElementById('msgs'); c.scrollTop=c.scrollHeight; }
function rx(e){ sock.emit('reaction',{roomId,emoji:e}); flyRx(e); }
function flyRx(e){
  const el=document.createElement('div'); el.className='rxp'; el.textContent=e;
  el.style.left=(Math.random()*(window.innerWidth-60)+20)+'px';
  el.style.top=(window.innerHeight-110)+'px';
  document.body.appendChild(el); setTimeout(()=>el.remove(),2100);
}

// ══════════════════════════════════════════════════════════════
// USERS
// ══════════════════════════════════════════════════════════════
function renderUsers(){
  const list=document.getElementById('ulist'); list.innerHTML='';
  const inV=Object.keys(remAudio).length+(voiceOn?1:0);
  document.getElementById('vcnt').textContent=inV?`${inV} in voice`:'';

  Object.values(users).forEach(u=>{
    const me=u.id===myId;
    const hasMic=(me&&voiceOn)||!!remAudio[u.id];
    const hasScr=isScrSharing&&me;
    const d=document.createElement('div'); d.className='ui';
    d.innerHTML=`<div class="uav">${u.avatar||'🦊'}</div>
      <div class="unm">${esc(u.username)}${me?' (You)':''}</div>
      <div class="ubdg">
        ${me?'<span class="bdg b-host">HOST</span>':''}
        ${hasMic?'<span class="bdg b-mic">🎙️</span>':''}
        ${hasScr?'<span class="bdg b-scr">🖥️</span>':''}
      </div>`;
    list.appendChild(d);
  });
}

// ══════════════════════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════════════════════
function stab(t){
  document.querySelectorAll('.stab').forEach((b,i)=>b.classList.toggle('on',(t==='chat'&&i===0)||(t==='users'&&i===1)));
  document.getElementById('p-chat').classList.toggle('on',t==='chat');
  document.getElementById('p-users').classList.toggle('on',t==='users');
}
function toggleSide(){ document.getElementById('sidebar').classList.toggle('open'); }
function copyLink(){
  navigator.clipboard.writeText(location.href).then(()=>toast('Invite link copied! 🔗')).catch(()=>toast('Copy URL from address bar','i'));
}
function leaveRoom(){ stopScreen(); stopVoice(); sock.disconnect(); location.href='/'; }
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className='toast show'+(type?' '+type:'');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),3200);
}
function esc(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function ytId(u){ const m=u.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/)([^&\n?#]+)/); return m?m[1]:null; }
function gdId(u){ const m=u.match(/\/d\/([a-zA-Z0-9_-]+)/); return m?m[1]:null; }

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName)) return;
  if(e.code==='Space'){e.preventDefault();pPlay();}
  if(e.code==='ArrowLeft') pSkip(-10);
  if(e.code==='ArrowRight')pSkip(10);
  if(e.code==='KeyM')      pMute();
  if(e.code==='KeyF')      pFull();
});

window.addEventListener('beforeunload',()=>{ stopScreen(); stopVoice(); });
document.addEventListener('click',e=>{
  const sb=document.getElementById('sidebar');
  if(window.innerWidth<=768&&sb.classList.contains('open')&&!sb.contains(e.target)&&!e.target.closest('.mob'))
    sb.classList.remove('open');
});

// Guard: no username → prompt
if(!sessionStorage.getItem('username')){
  const n=prompt('Enter your name to join:');
  if(n?.trim()){ sessionStorage.setItem('username',n.trim()); location.reload(); }
  else location.href='/';
}
srcChange(); // init placeholder
