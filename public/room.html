<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>WatchTogether</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0a0f;--sur:#13131a;--card:#1a1a25;--acc:#7c3aed;--a2:#06b6d4;--a3:#f59e0b;--txt:#f0f0f8;--dim:#6b6b8a;--brd:#2a2a3a;--ok:#10b981;--er:#ef4444;--sw:310px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Space Grotesk',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
/* topbar */
.bar{display:flex;align-items:center;gap:.5rem;padding:.48rem .85rem;background:var(--sur);border-bottom:1px solid var(--brd);flex-shrink:0;flex-wrap:wrap}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:2px;background:linear-gradient(135deg,var(--acc),var(--a2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.pill{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.4);border-radius:7px;padding:.22rem .58rem;font-size:.72rem;font-weight:700;color:var(--a2);cursor:pointer;white-space:nowrap}
.acts{display:flex;gap:.28rem;margin-left:auto;flex-wrap:wrap}
.btn{display:flex;align-items:center;gap:.22rem;padding:.32rem .62rem;border:1px solid var(--brd);border-radius:7px;background:var(--card);color:var(--txt);font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .14s;white-space:nowrap;user-select:none}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn.on{background:var(--acc);border-color:var(--acc);color:#fff}
.btn.grn{background:var(--ok);border-color:var(--ok);color:#fff}
.btn.red{background:var(--er);border-color:var(--er);color:#fff}
.mob{display:none}
/* layout */
.wrap{display:flex;flex:1;overflow:hidden}
.vsec{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#000;min-width:0}
.vbox{flex:1;position:relative;background:#000;overflow:hidden}
/* placeholder */
.ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;background:radial-gradient(ellipse at center,#1a1a2e,#000);z-index:2}
.ph h2{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:2px;color:var(--dim)}
.ph p{color:var(--dim);font-size:.78rem;text-align:center;padding:0 1.5rem;max-width:300px;line-height:1.6}
/* video elements — all absolute, shown/hidden via display */
#ifr,#scrVid,#prvVid,#plyr{position:absolute;inset:0;display:none}
#ifr{border:none;z-index:3}
#scrVid{width:100%;height:100%;object-fit:contain;background:#000;z-index:3}
#prvVid{width:100%;height:100%;object-fit:contain;background:#000;z-index:3}
#plyr{flex-direction:column;background:#000;z-index:3}
#plyr.on{display:flex}
#vid{width:100%;flex:1;background:#000;object-fit:contain;cursor:pointer;min-height:0;display:block}
/* subtitle */
.sub{position:absolute;bottom:74px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:10;max-width:88%}
.sub span{display:inline-block;background:rgba(0,0,0,.85);color:#fff;font-size:clamp(.82rem,2.1vw,1.05rem);padding:.18rem .62rem;border-radius:5px;line-height:1.5;white-space:pre-wrap}
/* controls */
.ctrl{flex-shrink:0;background:linear-gradient(0deg,rgba(0,0,0,.97),rgba(0,0,0,.4));padding:.38rem .62rem .32rem;display:flex;flex-direction:column;gap:.32rem;user-select:none}
.srow{display:flex;align-items:center;gap:.38rem}
.tlbl{font-size:.65rem;color:#bbb;white-space:nowrap;min-width:88px}
.sw{flex:1;position:relative;height:20px;display:flex;align-items:center;cursor:pointer}
.st{width:100%;height:4px;background:rgba(255,255,255,.18);border-radius:4px;position:relative;transition:height .1s}
.sw:hover .st{height:6px}
.sbuf{height:100%;background:rgba(255,255,255,.28);border-radius:4px;position:absolute;left:0;top:0;width:0}
.sfil{height:100%;background:var(--acc);border-radius:4px;position:absolute;left:0;top:0;width:0}
.sthm{width:12px;height:12px;background:#fff;border-radius:50%;position:absolute;top:50%;transform:translate(-50%,-50%);pointer-events:none;box-shadow:0 0 4px #0005}
.sw:hover .sthm{transform:translate(-50%,-50%) scale(1.4)}
.crow{display:flex;align-items:center;gap:.28rem;flex-wrap:wrap}
.cb{background:none;border:none;color:#fff;cursor:pointer;padding:.14rem .22rem;border-radius:4px;font-size:.88rem;display:flex;align-items:center;min-width:22px;justify-content:center;transition:background .1s}
.cb:hover{background:rgba(255,255,255,.13)}
.cb svg{width:15px;height:15px;fill:#fff}
.vw{display:flex;align-items:center;gap:.22rem}
.vs{width:60px;height:4px;accent-color:var(--acc);cursor:pointer}
.csel{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.16);border-radius:5px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.65rem;padding:.14rem .28rem;cursor:pointer;max-width:100px}
.csel option{background:#1a1a25;color:#fff}
.sp{flex:1}
/* overlays */
.fsbtn{position:absolute;top:.58rem;right:.58rem;z-index:20;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.2);border-radius:7px;color:#fff;font-size:.72rem;padding:.26rem .58rem;cursor:pointer;display:none;font-family:'Space Grotesk',sans-serif;font-weight:600;align-items:center;gap:.22rem}
.fsbtn.on{display:flex}
.scrbar{display:none;position:absolute;bottom:.65rem;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.9);border:1px solid var(--brd);border-radius:9px;padding:.3rem .75rem;gap:.55rem;align-items:center;font-size:.75rem;z-index:20;white-space:nowrap}
.scrbar.on{display:flex}
.qbdg{position:absolute;top:.58rem;left:.58rem;z-index:20;background:rgba(0,0,0,.7);border:1px solid var(--ok);color:var(--ok);padding:.12rem .38rem;border-radius:5px;font-size:.62rem;font-weight:700;display:none}
.qbdg.on{display:block}
/* url bar */
.ubar{display:flex;gap:.34rem;padding:.44rem .62rem;background:var(--sur);border-top:1px solid var(--brd);flex-wrap:wrap;flex-shrink:0}
.usel{padding:.34rem .48rem;background:var(--card);border:1px solid var(--brd);border-radius:7px;color:var(--txt);font-family:'Space Grotesk',sans-serif;font-size:.72rem;cursor:pointer}
.uinp{flex:1;padding:.34rem .58rem;background:var(--card);border:1px solid var(--brd);border-radius:7px;color:var(--txt);font-family:'Space Grotesk',sans-serif;font-size:.76rem;min-width:0}
.uinp:focus{outline:none;border-color:var(--acc)}
.ulbtn{padding:.34rem .75rem;background:var(--acc);border:none;border-radius:7px;color:#fff;font-family:'Space Grotesk',sans-serif;font-size:.76rem;font-weight:600;cursor:pointer;white-space:nowrap}
.ulbtn:hover{background:#6d28d9}
/* subtitle row */
.subrow{display:none;align-items:center;gap:.4rem;padding:.26rem .62rem;background:rgba(6,182,212,.06);border-top:1px solid rgba(6,182,212,.14);font-size:.72rem;color:var(--a2);flex-shrink:0;flex-wrap:wrap}
.subrow.on{display:flex}
.sfbtn{background:rgba(6,182,212,.12);border:1px solid rgba(6,182,212,.32);border-radius:6px;color:var(--a2);font-family:'Space Grotesk',sans-serif;font-size:.68rem;font-weight:600;padding:.18rem .48rem;cursor:pointer}
#subFile{display:none}
/* sidebar */
.side{width:var(--sw);display:flex;flex-direction:column;background:var(--sur);border-left:1px solid var(--brd);flex-shrink:0}
.stabs{display:flex;border-bottom:1px solid var(--brd)}
.stab{flex:1;padding:.58rem;border:none;background:transparent;color:var(--dim);font-family:'Space Grotesk',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.stab.on{color:var(--a2);border-bottom-color:var(--a2)}
.span{display:none;flex:1;flex-direction:column;overflow:hidden}
.span.on{display:flex}
.ulist{flex:1;overflow-y:auto;padding:.62rem}
.ui{display:flex;align-items:center;gap:.52rem;padding:.4rem .54rem;border-radius:9px;margin-bottom:.32rem;background:var(--card);border:1px solid var(--brd)}
.uav{width:30px;height:30px;border-radius:50%;background:rgba(124,58,237,.2);display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.unm{font-weight:600;font-size:.82rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ubdg{display:flex;gap:.16rem;flex-shrink:0}
.bdg{font-size:.58rem;padding:.07rem .26rem;border-radius:4px;font-weight:700}
.bh{background:rgba(245,158,11,.2);color:var(--a3)}
.bm{background:rgba(16,185,129,.2);color:var(--ok)}
.bs{background:rgba(6,182,212,.2);color:var(--a2)}
.vbar{display:none;align-items:center;gap:.38rem;padding:.36rem .62rem;background:rgba(16,185,129,.07);border-top:1px solid rgba(16,185,129,.18);font-size:.74rem;flex-shrink:0}
.vbar.on{display:flex}
.vdot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:vd 1.1s ease infinite}
@keyframes vd{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}
/* chat */
.cmsg{flex:1;overflow-y:auto;padding:.54rem;display:flex;flex-direction:column;gap:.38rem}
.msg{background:var(--card);border:1px solid var(--brd);border-radius:10px 10px 10px 3px;padding:.38rem .54rem}
.msg.me{background:rgba(124,58,237,.11);border-color:rgba(124,58,237,.28);border-radius:10px 10px 3px 10px}
.mh{display:flex;align-items:center;gap:.24rem;margin-bottom:.12rem}
.mn{font-size:.65rem;font-weight:700;color:var(--a2)}
.mt{font-size:.57rem;color:var(--dim);margin-left:auto}
.mb{font-size:.79rem;line-height:1.5;word-break:break-word}
.sys{text-align:center;font-size:.65rem;color:var(--dim);padding:.12rem 0}
.rxbar{display:flex;gap:.26rem;padding:.36rem .56rem;border-top:1px solid var(--brd);overflow-x:auto;flex-shrink:0}
.rxb{border:1px solid var(--brd);background:var(--card);border-radius:7px;padding:.16rem .4rem;font-size:.88rem;cursor:pointer;transition:transform .1s}
.rxb:hover{transform:scale(1.3)}
.carea{display:flex;gap:.34rem;padding:.48rem;border-top:1px solid var(--brd);flex-shrink:0}
.cinp{flex:1;padding:.4rem .56rem;background:var(--card);border:1px solid var(--brd);border-radius:9px;color:var(--txt);font-family:'Space Grotesk',sans-serif;font-size:.79rem}
.cinp:focus{outline:none;border-color:var(--acc)}
.csnd{padding:.4rem .68rem;background:var(--acc);border:none;border-radius:9px;color:#fff;cursor:pointer;font-size:.88rem}
.csnd:hover{background:#6d28d9}
/* toast */
.toast{position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--ok);color:#fff;padding:.48rem 1rem;border-radius:100px;font-weight:600;font-size:.76rem;transition:transform .22s ease;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.on{transform:translateX(-50%) translateY(0)}
.toast.e{background:var(--er)}.toast.i{background:var(--acc)}
.rxp{position:fixed;font-size:1.8rem;pointer-events:none;animation:fly 2s ease forwards;z-index:9998}
@keyframes fly{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-180px) scale(.4)}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:10px}
@media(max-width:768px){
  .mob{display:flex}
  .side{position:fixed;right:-100%;top:0;bottom:0;z-index:50;width:min(310px,100vw);transition:right .22s}
  .side.open{right:0}
  .btn .lbl{display:none}
  .vs{width:42px}
}
</style>
</head>
<body>

<div class="bar">
  <div class="logo">WatchTogether</div>
  <div class="pill" id="codePill" onclick="cpLink()">🔗 ------</div>
  <div class="acts">
    <button class="btn" id="vBtn" onclick="toggleVoice()">🎙️ <span class="lbl">Voice</span></button>
    <button class="btn" id="mBtn" onclick="toggleMute()" style="display:none">🔇 <span class="lbl">Mute</span></button>
    <button class="btn" id="sBtn" onclick="toggleScr()">🖥️ <span class="lbl">Share</span></button>
    <button class="btn mob" onclick="document.getElementById('side').classList.toggle('open')">💬</button>
    <button class="btn" onclick="leaveRoom()" style="border-color:var(--er);color:var(--er)">🚪</button>
  </div>
</div>

<div class="wrap">
  <div class="vsec">
    <div class="vbox" id="vbox">
      <div class="ph" id="ph"><div style="font-size:2.8rem">🎬</div><h2>No Video</h2><p>Choose source, paste URL, click Load. For Netflix/Prime use Screen Share.</p></div>
      <iframe id="ifr" allowfullscreen allow="autoplay;fullscreen;encrypted-media"></iframe>
      <video id="scrVid" autoplay playsinline></video>
      <video id="prvVid" autoplay playsinline muted></video>
      <div id="plyr">
        <video id="vid" playsinline></video>
        <div class="sub"><span id="subTxt"></span></div>
        <div class="ctrl">
          <div class="srow">
            <span class="tlbl" id="tlbl">0:00 / 0:00</span>
            <div class="sw" id="seekEl">
              <div class="st"><div class="sbuf" id="sbuf"></div><div class="sfil" id="sfil"></div><div class="sthm" id="sthm"></div></div>
            </div>
          </div>
          <div class="crow">
            <button class="cb" onclick="pPlay()"><svg><path id="pip" d="M8 5v14l11-7z"/></svg></button>
            <button class="cb" onclick="pSkip(-10)" title="←">⏮10</button>
            <button class="cb" onclick="pSkip(10)"  title="→">10⏭</button>
            <div class="vw">
              <button class="cb" id="volIco" onclick="pMute()">🔊</button>
              <input type="range" class="vs" id="volSl" min="0" max="1" step="0.02" value="1" oninput="pVol(this.value)"/>
            </div>
            <div class="sp"></div>
            <select class="csel" id="audSel" onchange="pAudio(this.value)" style="display:none"></select>
            <select class="csel" id="subSel" onchange="pSub(this.value)"><option value="off">Subs: Off</option></select>
            <select class="csel" onchange="pSpeed(this.value)">
              <option value="0.5">0.5×</option><option value="0.75">0.75×</option>
              <option value="1" selected>1×</option><option value="1.25">1.25×</option>
              <option value="1.5">1.5×</option><option value="2">2×</option>
            </select>
            <button class="cb" onclick="pFull()"><svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
          </div>
        </div>
      </div>
      <button class="fsbtn" id="fsbtn" onclick="scrFull()">⛶ Fullscreen</button>
      <div class="qbdg" id="qbdg">1080p 60fps</div>
      <div class="scrbar" id="scrbar">🖥️ Sharing <button class="btn red" onclick="stopScr()" style="padding:.16rem .48rem;font-size:.68rem">⏹ Stop</button></div>
    </div>
    <div class="ubar">
      <select class="usel" id="srcSel" onchange="srcChg()">
        <option value="direct">🎬 Direct (.mp4/.mkv)</option>
        <option value="youtube">▶ YouTube</option>
        <option value="gdrive">☁ Google Drive</option>
        <option value="iframe">🌐 Any Site</option>
      </select>
      <input class="uinp" id="urlInp" placeholder="Paste direct .mp4/.mkv/.webm URL here…"/>
      <button class="ulbtn" onclick="loadVid()">▶ Load</button>
    </div>
    <div class="subrow" id="subrow">
      📄 Tracks: <span id="trkInfo" style="font-size:.68rem;color:var(--dim)">load a video</span>
      <button class="sfbtn" onclick="document.getElementById('subFile').click()">+ SRT/VTT</button>
      <input type="file" id="subFile" accept=".srt,.vtt" onchange="loadSubFile(this)"/>
      <span id="subName" style="color:var(--ok);font-size:.7rem"></span>
    </div>
  </div>

  <div class="side" id="side">
    <div class="stabs">
      <button class="stab on" onclick="stab('chat')">💬 Chat</button>
      <button class="stab"    onclick="stab('users')">👥 Users</button>
    </div>
    <div class="span on" id="p-chat">
      <div class="cmsg" id="msgs"></div>
      <div class="rxbar">
        <button class="rxb" onclick="doRx('😂')">😂</button><button class="rxb" onclick="doRx('❤️')">❤️</button>
        <button class="rxb" onclick="doRx('🔥')">🔥</button><button class="rxb" onclick="doRx('😮')">😮</button>
        <button class="rxb" onclick="doRx('👏')">👏</button><button class="rxb" onclick="doRx('😢')">😢</button>
        <button class="rxb" onclick="doRx('💀')">💀</button><button class="rxb" onclick="doRx('🍿')">🍿</button>
      </div>
      <div class="carea">
        <input class="cinp" id="cinp" placeholder="Say something…" maxlength="300" onkeydown="if(event.key==='Enter')sendChat()"/>
        <button class="csnd" onclick="sendChat()">➤</button>
      </div>
    </div>
    <div class="span" id="p-users">
      <div class="ulist" id="ulist"></div>
      <div class="vbar" id="vbar"><div class="vdot"></div><span style="font-size:.76rem;font-weight:600">Voice Active</span><span id="vcnt" style="margin-left:auto;font-size:.72rem;color:var(--dim)"></span></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
'use strict';
// ─── state ────────────────────────────────────────────────────
const RID  = location.pathname.split('/room/')[1];
const NAME = sessionStorage.getItem('wt-name') || ('Guest'+(Math.random()*9999|0));
let ME = null, users = {};

// video sync
let syncLock=false, syncTmr=null, seekTmr=null;
const VE = {};  // named video event listeners for cleanup

// screen share
let scrOn=false, scrStream=null;
// scrPeers[peerId] = { pc, iceBuf[] }
const scrPeers = {};

// voice
let micOn=false, micMuted=false, micStream=null;
// vPeers[peerId] = { pc, iceBuf[] }
const vPeers = {};
// rAudio[peerId] = <audio>
const rAudio = {};

// subtitles
let extCues=[], extOn=false;

// ─── ICE config ───────────────────────────────────────────────
// Multiple STUN + TURN relay so it works on all networks
const ICE = { iceServers:[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {urls:'stun:stun2.l.google.com:19302'},
  {urls:'stun:stun4.l.google.com:19302'},
  // Free TURN relay — works even on mobile/corporate NAT
  {urls:'turn:openrelay.metered.ca:80',   username:'openrelayproject',credential:'openrelayproject'},
  {urls:'turn:openrelay.metered.ca:443',  username:'openrelayproject',credential:'openrelayproject'},
], iceCandidatePoolSize:8 };

// ─── socket ───────────────────────────────────────────────────
const io = window.io({transports:['websocket','polling']});

io.on('connect', ()=>{
  ME = io.id;
  document.getElementById('codePill').textContent = '🔗 '+RID;
  io.emit('join', {roomId:RID, name:NAME});
});

io.on('init', ({users:u, video:v, msgs, sharer, voices})=>{
  users={}; u.forEach(x=>users[x.id]=x); renderUsers();
  msgs.forEach(m=>addMsg(m, m.uid===ME));
  if(v?.url) loadState(v);
  // Request screen if someone is sharing
  if(sharer && sharer!==ME)
    setTimeout(()=>io.emit('scr-want',{from:sharer}), 800);
});

io.on('peer-join', u=>{ users[u.id]=u; renderUsers(); toast(u.name+' joined 👋','i'); sysMsg(u.av+' '+u.name+' joined'); if(scrOn)setTimeout(()=>scrOffer(u.id),300); if(micOn)setTimeout(()=>vOffer(u.id),400); });
io.on('peer-left', ({id})=>{ if(users[id])sysMsg(users[id].av+' '+users[id].name+' left'); delete users[id]; closeSP(id); closeVP(id); renderUsers(); });
io.on('users', list=>{ users={}; list.forEach(u=>users[u.id]=u); renderUsers(); });

// video sync
io.on('v-load',  ({url,type})=>loadState({url,type,time:0,playing:false}));
io.on('v-play',  ({time})=>{ const v=getV(); if(!v)return; lock(()=>{v.currentTime=time;v.play().catch(()=>{})}); pIcon(true);  });
io.on('v-pause', ({time})=>{ const v=getV(); if(!v)return; lock(()=>{v.currentTime=time;v.pause()}); pIcon(false); });
io.on('v-seek',  ({time})=>{ const v=getV(); if(!v)return; lock(()=>{v.currentTime=time}); });

// screen share
io.on('scr-started',({from,name})=>{ toast(name+' sharing screen 🖥️','i'); sysMsg('🖥️ '+name+' started sharing'); io.emit('scr-want',{from}); });
io.on('scr-stopped',()=>{ hideScr(); sysMsg('🖥️ Screen sharing ended'); });
io.on('scr-viewer', ({viewer})=>{ if(scrOn)scrOffer(viewer); });

// WebRTC — the server relays all of these
io.on('rtc-offer',  ({from,sdp,ch})=>{ if(ch==='scr')scrAnswer(from,sdp); else vAnswer(from,sdp); });
io.on('rtc-answer', ({from,sdp,ch})=>{ if(ch==='scr')scrOnAns(from,sdp); else vOnAns(from,sdp);  });
io.on('rtc-ice',    ({from,ice,ch})=>{ if(ch==='scr')addIce(scrPeers[from],ice); else addIce(vPeers[from],ice); });

// voice presence
io.on('voice-peers', ({peers})=>peers.forEach(id=>setTimeout(()=>vOffer(id),150)));
io.on('mic-on',  ({id})=>{ if(id!==ME && !vPeers[id] && micOn) vOffer(id); });
io.on('mic-off', ({id})=>closeVP(id));

// chat
io.on('msg', m=>{ addMsg(m,m.uid===ME); scrollMsgs(); });
io.on('rx',  ({emoji})=>flyRx(emoji));

// ─── ICE trickle helper ───────────────────────────────────────
// Buffer candidates until setRemoteDescription is done.
// This is the #1 fix for black screen / no audio on WebRTC.
async function addIce(entry, ice) {
  if(!entry) return;
  if(entry.pc.remoteDescription && entry.pc.remoteDescription.type) {
    try{ await entry.pc.addIceCandidate(ice); }catch(e){}
  } else {
    entry.iceBuf.push(ice);
  }
}

async function drain(entry) {
  for(const c of entry.iceBuf) try{ await entry.pc.addIceCandidate(c); }catch(e){}
  entry.iceBuf = [];
}

// ─── screen share ─────────────────────────────────────────────
async function toggleScr(){ scrOn?stopScr():await startScr(); }

async function startScr(){
  try{
    scrStream = await navigator.mediaDevices.getDisplayMedia({
      video:{frameRate:{ideal:60,max:60},width:{ideal:1920},height:{ideal:1080}},
      audio:{echoCancellation:false,noiseSuppression:false}
    });
    scrOn=true;
    hideAll();
    const pv=document.getElementById('prvVid');
    pv.srcObject=scrStream; pv.style.display='block';
    document.getElementById('scrbar').classList.add('on');
    document.getElementById('qbdg').classList.add('on');
    document.getElementById('sBtn').classList.add('on');
    document.getElementById('sBtn').innerHTML='⏹ <span class="lbl">Sharing</span>';
    io.emit('scr-start');
    Object.keys(users).filter(x=>x!==ME).forEach(id=>setTimeout(()=>scrOffer(id),200));
    scrStream.getVideoTracks()[0].addEventListener('ended', stopScr);
    toast('Sharing started 🖥️','i');
  }catch(e){ toast(e.name==='NotAllowedError'?'Permission denied':'Cannot share screen','e'); }
}

function stopScr(){
  if(scrStream){scrStream.getTracks().forEach(t=>t.stop());scrStream=null;}
  scrOn=false;
  Object.keys(scrPeers).forEach(closeSP);
  const pv=document.getElementById('prvVid'); pv.srcObject=null; pv.style.display='none';
  document.getElementById('scrbar').classList.remove('on');
  document.getElementById('qbdg').classList.remove('on');
  document.getElementById('sBtn').classList.remove('on');
  document.getElementById('sBtn').innerHTML='🖥️ <span class="lbl">Share</span>';
  document.getElementById('ph').style.display='flex';
  io.emit('scr-stop');
  toast('Sharing stopped');
}

function closeSP(id){ if(scrPeers[id]){try{scrPeers[id].pc.close()}catch(e){}; delete scrPeers[id];} }

async function scrOffer(viewerId){
  closeSP(viewerId);
  const e={pc:new RTCPeerConnection(ICE),iceBuf:[]};
  scrPeers[viewerId]=e;
  const {pc}=e;
  scrStream.getTracks().forEach(t=>pc.addTrack(t,scrStream));
  pc.onicecandidate=c=>{ if(c.candidate)io.emit('rtc-ice',{to:viewerId,ice:c.candidate,ch:'scr'}); };
  pc.oniceconnectionstatechange=()=>{ if(pc.iceConnectionState==='failed')pc.restartIce(); };
  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);
  io.emit('rtc-offer',{to:viewerId,sdp:pc.localDescription,ch:'scr'});
}

async function scrAnswer(sharerId, sdp){
  closeSP(sharerId);
  const e={pc:new RTCPeerConnection(ICE),iceBuf:[]};
  scrPeers[sharerId]=e;
  const {pc}=e;
  pc.onicecandidate=c=>{ if(c.candidate)io.emit('rtc-ice',{to:sharerId,ice:c.candidate,ch:'scr'}); };
  pc.oniceconnectionstatechange=()=>{ if(pc.iceConnectionState==='failed')pc.restartIce(); };

  // Build MediaStream before any tracks arrive — assign to video element now
  const ms=new MediaStream();
  const sv=document.getElementById('scrVid');

  pc.ontrack=({track})=>{
    ms.addTrack(track);
    // Only assign srcObject once
    if(sv.srcObject!==ms) sv.srcObject=ms;
    if(sv.style.display!=='block'){
      sv.style.display='block';
      sv.play().catch(()=>{});
      document.getElementById('prvVid').style.display='none';
      document.getElementById('ifr').style.display='none';
      document.getElementById('plyr').classList.remove('on');
      document.getElementById('ph').style.display='none';
      document.getElementById('qbdg').classList.add('on');
      document.getElementById('fsbtn').classList.add('on');
    }
  };

  await pc.setRemoteDescription(sdp);
  await drain(e);  // ← flush buffered ICE now that remote desc is set
  const ans=await pc.createAnswer();
  await pc.setLocalDescription(ans);
  io.emit('rtc-answer',{to:sharerId,sdp:pc.localDescription,ch:'scr'});
}

async function scrOnAns(viewerId, sdp){
  const e=scrPeers[viewerId]; if(!e)return;
  if(e.pc.signalingState!=='have-local-offer')return;
  await e.pc.setRemoteDescription(sdp);
  await drain(e);
}

function hideScr(){
  const sv=document.getElementById('scrVid');
  sv.srcObject=null; sv.style.display='none';
  document.getElementById('fsbtn').classList.remove('on');
  document.getElementById('qbdg').classList.remove('on');
  document.getElementById('ph').style.display='flex';
}
function scrFull(){ const el=document.getElementById('scrVid'); (el.requestFullscreen||el.webkitRequestFullscreen).call(el); }

// ─── voice chat ───────────────────────────────────────────────
async function toggleVoice(){ micOn?stopVoice():await startVoice(); }

async function startVoice(){
  try{
    micStream=await navigator.mediaDevices.getUserMedia({
      audio:{
        echoCancellation:true,  // AEC — removes your own voice from loop
        noiseSuppression:true,  // NS  — removes background noise
        autoGainControl:true,   // AGC — keeps your volume consistent
        sampleRate:48000,
        channelCount:1,         // mono = less data, less echo risk
      },
      video:false
    });
    micOn=true;
    document.getElementById('vBtn').classList.add('grn');
    document.getElementById('vBtn').innerHTML='🎙️ <span class="lbl">In Voice</span>';
    document.getElementById('mBtn').style.display='flex';
    document.getElementById('vbar').classList.add('on');
    io.emit('mic-on');
    // server responds with voice-peers (who is already in voice)
    toast('Voice active 🎙️','i');
  }catch(e){ toast(e.name==='NotAllowedError'?'Mic denied':'Cannot access mic','e'); }
}

function stopVoice(){
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
  micOn=false; micMuted=false;
  Object.keys(vPeers).forEach(closeVP);
  document.getElementById('vBtn').classList.remove('grn');
  document.getElementById('vBtn').innerHTML='🎙️ <span class="lbl">Voice</span>';
  document.getElementById('mBtn').style.display='none';
  document.getElementById('mBtn').classList.remove('red');
  document.getElementById('mBtn').innerHTML='🔇 <span class="lbl">Mute</span>';
  document.getElementById('vbar').classList.remove('on');
  io.emit('mic-off');
  toast('Left voice');
}

function toggleMute(){
  if(!micStream)return;
  micMuted=!micMuted;
  micStream.getAudioTracks().forEach(t=>t.enabled=!micMuted);
  const b=document.getElementById('mBtn');
  b.innerHTML=micMuted?'🔇 <span class="lbl">Unmute</span>':'🎤 <span class="lbl">Mute</span>';
  b.classList.toggle('red',micMuted);
  toast(micMuted?'Muted 🔇':'Unmuted 🎤');
}

function closeVP(id){
  if(vPeers[id]){try{vPeers[id].pc.close()}catch(e){}; delete vPeers[id];}
  if(rAudio[id]){rAudio[id].remove(); delete rAudio[id];}
  renderUsers();
}

function mkVoicePC(peerId){
  closeVP(peerId);
  const e={pc:new RTCPeerConnection(ICE),iceBuf:[]};
  vPeers[peerId]=e;
  const {pc}=e;

  // Add mic track BEFORE offer so SDP has audio
  if(micStream) micStream.getAudioTracks().forEach(t=>pc.addTrack(t,micStream));

  pc.onicecandidate=c=>{ if(c.candidate)io.emit('rtc-ice',{to:peerId,ice:c.candidate,ch:'voice'}); };
  pc.oniceconnectionstatechange=()=>{
    const s=pc.iceConnectionState;
    if(s==='failed')pc.restartIce();
    if(s==='disconnected')setTimeout(()=>{ if(vPeers[peerId]?.pc===pc && pc.iceConnectionState==='disconnected')pc.restartIce(); },5000);
  };

  pc.ontrack=({track})=>{
    // Create a fresh MediaStream with just this one track
    const ms=new MediaStream([track]);
    if(rAudio[peerId])rAudio[peerId].remove();
    const a=document.createElement('audio');
    a.srcObject=ms;
    a.autoplay=true;
    a.volume=1;
    // NEVER set a.muted — that silences everything
    a.style.display='none';
    document.body.appendChild(a);
    rAudio[peerId]=a;
    // Resume on user gesture if browser blocked autoplay
    const play=()=>a.play().catch(()=>{});
    play();
    ['click','keydown','touchstart'].forEach(ev=>document.addEventListener(ev,play,{once:true}));
    renderUsers();
  };

  return e;
}

async function vOffer(peerId){
  if(vPeers[peerId])return; // already connected
  const e=mkVoicePC(peerId);
  try{
    const offer=await e.pc.createOffer({offerToReceiveAudio:true});
    await e.pc.setLocalDescription(offer);
    io.emit('rtc-offer',{to:peerId,sdp:e.pc.localDescription,ch:'voice'});
  }catch(err){console.warn('vOffer',err);closeVP(peerId);}
}

async function vAnswer(fromId, sdp){
  const e=mkVoicePC(fromId);
  try{
    await e.pc.setRemoteDescription(sdp);
    await drain(e); // flush buffered ICE
    const ans=await e.pc.createAnswer();
    await e.pc.setLocalDescription(ans);
    io.emit('rtc-answer',{to:fromId,sdp:e.pc.localDescription,ch:'voice'});
  }catch(err){console.warn('vAnswer',err);closeVP(fromId);}
}

async function vOnAns(fromId, sdp){
  const e=vPeers[fromId]; if(!e)return;
  if(e.pc.signalingState!=='have-local-offer')return;
  try{
    await e.pc.setRemoteDescription(sdp);
    await drain(e);
  }catch(err){console.warn('vOnAns',err);}
}

// ─── video player ──────────────────────────────────────────────
function srcChg(){
  const s=document.getElementById('srcSel').value;
  document.getElementById('urlInp').placeholder={
    direct:'Paste .mp4/.mkv/.webm/.m3u8 URL…',
    youtube:'YouTube URL…',gdrive:'Google Drive share link…',iframe:'Any website URL…'
  }[s]||'';
  document.getElementById('subrow').classList.toggle('on',s==='direct');
}

function loadVid(){
  let url=document.getElementById('urlInp').value.trim();
  const src=document.getElementById('srcSel').value;
  if(!url){toast('Paste a URL!','e');return;}
  let final=url,type=src;
  if(src==='youtube'){
    const id=ytId(url); if(!id){toast('Bad YouTube URL','e');return;}
    final=`https://www.youtube.com/embed/${id}?autoplay=1&rel=0`; type='iframe';
  } else if(src==='gdrive'){
    const id=gdId(url); if(id)final=`https://drive.google.com/file/d/${id}/preview`; type='iframe';
  } else if(src==='iframe'){ type='iframe'; }

  io.emit('v-load',{url:final,type});
  loadState({url:final,type,time:0,playing:false});
}

function loadState({url,type,time,playing}){
  if(!url)return;
  hideAll();
  if(type==='direct'){
    document.getElementById('subrow').classList.add('on');
    startPlayer(url,time||0,!!playing);
  } else {
    const f=document.getElementById('ifr'); f.src=url; f.style.display='block';
  }
}

function hideAll(){
  document.getElementById('ph').style.display='none';
  document.getElementById('ifr').style.display='none';
  if(!scrOn){document.getElementById('scrVid').style.display='none';document.getElementById('prvVid').style.display='none';}
  document.getElementById('plyr').classList.remove('on');
  document.getElementById('fsbtn').classList.remove('on');
}

function startPlayer(url, t0, play0){
  const vid=document.getElementById('vid');
  // Remove ALL old listeners first (prevents stacking = freeze bug)
  Object.entries(VE).forEach(([ev,fn])=>vid.removeEventListener(ev,fn));
  for(const k in VE)delete VE[k];
  // Reset subs
  extCues=[];extOn=false;
  document.getElementById('subTxt').textContent='';
  document.getElementById('subSel').innerHTML='<option value="off">Subs: Off</option>';
  document.getElementById('subName').textContent='';
  document.getElementById('trkInfo').textContent='Loading…';

  document.getElementById('plyr').classList.add('on');
  vid.src=url; vid.load();

  vid.addEventListener('loadedmetadata',()=>{
    if(t0>0)vid.currentTime=t0;
    if(play0)vid.play().catch(()=>{}); else pIcon(false);
    buildTracks(); updTime(); updSeek();
  },{once:true});

  const fns={
    timeupdate:()=>{updTime();updSeek();if(extOn)renderSub(vid.currentTime);},
    progress:  ()=>updBuf(),
    play:      ()=>{if(syncLock)return;pIcon(true); io.emit('v-play', {time:vid.currentTime});},
    pause:     ()=>{if(syncLock)return;pIcon(false);io.emit('v-pause',{time:vid.currentTime});},
    seeked:    ()=>{if(syncLock)return;clearTimeout(seekTmr);seekTmr=setTimeout(()=>io.emit('v-seek',{time:vid.currentTime}),350);},
    click:     ()=>pPlay(),
  };
  Object.entries(fns).forEach(([ev,fn])=>{VE[ev]=fn;vid.addEventListener(ev,fn);});
}

function buildTracks(){
  const vid=document.getElementById('vid'),subSel=document.getElementById('subSel'),audSel=document.getElementById('audSel'),info=[];
  if(vid.audioTracks&&vid.audioTracks.length>1){
    audSel.innerHTML='';
    [...vid.audioTracks].forEach((t,i)=>{const o=document.createElement('option');o.value=i;o.textContent=t.label||t.language||'Audio '+(i+1);audSel.appendChild(o);});
    audSel.style.display='block'; info.push('🔊 '+vid.audioTracks.length+' audio');
  } else audSel.style.display='none';
  const tt=[...vid.textTracks];
  if(tt.length){
    tt.forEach(t=>t.mode='hidden');
    tt.forEach((t,i)=>{
      const o=document.createElement('option');o.value='i:'+i;o.textContent='📝 '+(t.label||t.language||'Sub '+(i+1));subSel.appendChild(o);
      t.addEventListener('cuechange',()=>{if(document.getElementById('subSel').value!=='i:'+i)return;const c=t.activeCues?.[0];document.getElementById('subTxt').textContent=c?(c.text||c.data||''):'';});
    });
    info.push('📝 '+tt.length+' sub');
  }
  document.getElementById('trkInfo').textContent=info.length?info.join(' · '):'No internal tracks';
}

function pSub(v){
  const vid=document.getElementById('vid');
  [...vid.textTracks].forEach(t=>t.mode='hidden');
  document.getElementById('subTxt').textContent='';extOn=false;
  if(v==='off')return;
  if(v.startsWith('i:')){const t=vid.textTracks[+v.slice(2)];if(t)t.mode='hidden';return;}
  if(v==='ext')extOn=true;
}
function pAudio(i){const vid=document.getElementById('vid');if(!vid.audioTracks)return;[...vid.audioTracks].forEach((t,j)=>t.enabled=j===+i);}
function loadSubFile(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    extCues=f.name.toLowerCase().endsWith('.srt')?parseSRT(e.target.result):parseVTT(e.target.result);
    extOn=true;
    const sel=document.getElementById('subSel');
    let o=sel.querySelector('option[value="ext"]');if(!o){o=document.createElement('option');o.value='ext';sel.appendChild(o);}
    o.textContent='📄 '+f.name; sel.value='ext';
    document.getElementById('subName').textContent='✅ '+f.name;
    toast('Subtitles loaded ✅','i');
  };r.readAsText(f,'UTF-8');
}
function renderSub(t){if(!extOn||!extCues.length)return;const c=extCues.find(x=>t>=x.s&&t<=x.e);document.getElementById('subTxt').textContent=c?c.t:'';}
function parseSRT(txt){return txt.replace(/\r\n/g,'\n').trim().split(/\n\n+/).map(b=>{const ls=b.split('\n');if(ls.length<3)return null;const m=ls[1].match(/(\d+:\d+:\d+[,.]\d+)\s*-->\s*(\d+:\d+:\d+[,.]\d+)/);if(!m)return null;return{s:srtT(m[1]),e:srtT(m[2]),t:ls.slice(2).join('\n').replace(/<[^>]+>/g,'')};}).filter(Boolean);}
function srtT(s){const[h,mn,r]=s.split(':'),[sc,ms]=r.replace(',','.').split('.');return+h*3600+ +mn*60+ +sc+ +ms/1000;}
function parseVTT(txt){return txt.replace(/\r\n/g,'\n').replace(/^WEBVTT[^\n]*/,'').trim().split(/\n\n+/).map(b=>{const ls=b.split('\n').filter(l=>l.trim()&&!l.startsWith('NOTE'));const tl=ls.find(l=>l.includes('-->'));if(!tl)return null;const m=tl.match(/([\d:.]+)\s*-->\s*([\d:.]+)/);if(!m)return null;return{s:vttT(m[1]),e:vttT(m[2]),t:ls.slice(ls.indexOf(tl)+1).join('\n').replace(/<[^>]+>/g,'')};}).filter(Boolean);}
function vttT(s){const p=s.split(':').map(Number);return p.length===3?p[0]*3600+p[1]*60+p[2]:p[0]*60+p[1];}

// seek bar
const SE=document.getElementById('seekEl');let sDrag=false;
function seekAt(e){const vid=document.getElementById('vid');if(!vid.duration)return;const r=SE.getBoundingClientRect(),cx=e.touches?e.touches[0].clientX:e.clientX;vid.currentTime=Math.max(0,Math.min(1,(cx-r.left)/r.width))*vid.duration;}
SE.addEventListener('mousedown',e=>{sDrag=true;seekAt(e)});
document.addEventListener('mousemove',e=>{if(sDrag)seekAt(e)});
document.addEventListener('mouseup',()=>sDrag=false);
SE.addEventListener('touchstart',e=>{sDrag=true;seekAt(e)},{passive:true});
SE.addEventListener('touchmove',e=>{if(sDrag)seekAt(e)},{passive:true});
SE.addEventListener('touchend',()=>sDrag=false);

function updSeek(){const vid=document.getElementById('vid');if(!vid.duration)return;const p=(vid.currentTime/vid.duration)*100;document.getElementById('sfil').style.width=p+'%';document.getElementById('sthm').style.left=p+'%';}
function updBuf(){const vid=document.getElementById('vid');if(!vid.duration||!vid.buffered.length)return;document.getElementById('sbuf').style.width=((vid.buffered.end(vid.buffered.length-1)/vid.duration)*100)+'%';}
function updTime(){const vid=document.getElementById('vid');document.getElementById('tlbl').textContent=fmt(vid.currentTime)+' / '+fmt(vid.duration||0);}
function fmt(s){if(!s||isNaN(s))return'0:00';const h=Math.floor(s/3600),m=Math.floor(s%3600/60),ss=Math.floor(s%60);return h?`${h}:${pad(m)}:${pad(ss)}`:`${m}:${pad(ss)}`;}
function pad(n){return String(n).padStart(2,'0');}

function lock(fn){syncLock=true;clearTimeout(syncTmr);fn();syncTmr=setTimeout(()=>syncLock=false,900);}
function getV(){const v=document.getElementById('vid');return document.getElementById('plyr').classList.contains('on')&&v.src?v:null;}

function pPlay(){const v=document.getElementById('vid');if(!v.src)return;v.paused?v.play().catch(()=>{}):v.pause();}
function pSkip(s){const v=document.getElementById('vid');if(!v.src)return;v.currentTime=Math.max(0,Math.min(v.duration||0,v.currentTime+s));}
function pVol(v){document.getElementById('vid').volume=v;document.getElementById('volIco').textContent=v==0?'🔇':v<.5?'🔈':'🔊';}
function pMute(){const v=document.getElementById('vid');v.muted=!v.muted;document.getElementById('volIco').textContent=v.muted?'🔇':'🔊';document.getElementById('volSl').value=v.muted?0:v.volume;}
function pSpeed(v){document.getElementById('vid').playbackRate=parseFloat(v);}
function pFull(){const w=document.getElementById('plyr');(w.requestFullscreen||w.webkitRequestFullscreen).call(w);}
function pIcon(pl){document.getElementById('pip').setAttribute('d',pl?'M6 19h4V5H6v14zm8-14v14h4V5h-4z':'M8 5v14l11-7z');}

// chat

function addMsg(m,mine){const c=document.getElementById('msgs'),d=document.createElement('div');d.className='msg'+(mine?' me':'');const ts=new Date(m.t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});d.innerHTML=`<div class="mh"><span>${m.av||'🦊'}</span><span class="mn">${esc(m.name)}</span><span class="mt">${ts}</span></div><div class="mb">${esc(m.text)}</div>`;c.appendChild(d);scrollMsgs();}
function sysMsg(t){const c=document.getElementById('msgs'),d=document.createElement('div');d.className='sys';d.textContent=t;c.appendChild(d);scrollMsgs();}

// UI
function stab(t){document.querySelectorAll('.stab').forEach((b,i)=>b.classList.toggle('on',(t==='chat'&&i===0)||(t==='users'&&i===1)));document.getElementById('p-chat').classList.toggle('on',t==='chat');document.getElementById('p-users').classList.toggle('on',t==='users');}
function cpLink(){navigator.clipboard.writeText(location.href).then(()=>toast('Link copied! 🔗')).catch(()=>toast('Copy the URL from address bar','i'));}
function leaveRoom(){stopScr();stopVoice();io.disconnect();location.href='/';}
function toast(msg,type=''){const t=document.getElementById('toast');t.textContent=msg;t.className='toast on'+(type?' '+type:'');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),3200);}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function ytId(u){const m=u.match(/(?:youtube\.com\/(?:watch\?v=|shorts\/|embed\/)|youtu\.be\/)([^&\n?#]+)/);return m?m[1]:null;}
function gdId(u){const m=u.match(/\/d\/([a-zA-Z0-9_-]+)/);return m?m[1]:null;}

document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA'].includes(document.activeElement?.tagName))return;
  if(e.code==='Space'){e.preventDefault();pPlay();}
  else if(e.code==='ArrowLeft')pSkip(-10);
  else if(e.code==='ArrowRight')pSkip(10);
  else if(e.code==='KeyM')pMute();
  else if(e.code==='KeyF')pFull();
});
window.addEventListener('beforeunload',()=>{stopScr();stopVoice();});
document.addEventListener('click',e=>{const sb=document.getElementById('side');if(window.innerWidth<=768&&sb.classList.contains('open')&&!sb.contains(e.target)&&!e.target.closest('.mob'))sb.classList.remove('open');});

// no username → prompt
if(!sessionStorage.getItem('wt-name')){
  const n=prompt('Enter your name:');
  if(n?.trim()){sessionStorage.setItem('wt-name',n.trim());location.reload();}
  else location.href='/';
}
srcChg();
</script>
