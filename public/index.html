<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>StreamTogether</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #0f0f13;
  color: #e8e8f0;
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1rem;
  gap: 2rem;
}
.logo {
  text-align: center;
}
.logo h1 {
  font-size: 2.4rem;
  font-weight: 800;
  background: linear-gradient(135deg, #818cf8, #38bdf8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
.logo p {
  color: #6b7280;
  margin-top: .4rem;
  font-size: .95rem;
}
.card {
  background: #1c1c28;
  border: 1px solid #2e2e42;
  border-radius: 18px;
  padding: 2rem;
  width: 100%;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}
.tabs {
  display: flex;
  background: #14141e;
  border-radius: 10px;
  padding: .3rem;
  gap: .3rem;
}
.tab {
  flex: 1;
  padding: .55rem;
  border: none;
  border-radius: 8px;
  font-family: inherit;
  font-size: .88rem;
  font-weight: 600;
  cursor: pointer;
  color: #6b7280;
  background: transparent;
  transition: all .15s;
}
.tab.active {
  background: #4f46e5;
  color: #fff;
}
.panel { display: none; flex-direction: column; gap: .85rem; }
.panel.active { display: flex; }
label { font-size: .78rem; color: #9ca3af; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
input {
  padding: .78rem 1rem;
  background: #14141e;
  border: 1.5px solid #2e2e42;
  border-radius: 10px;
  color: #e8e8f0;
  font-family: inherit;
  font-size: .95rem;
  width: 100%;
  transition: border-color .15s;
}
input:focus { outline: none; border-color: #4f46e5; }
input::placeholder { color: #3d3d55; }
.btn {
  width: 100%;
  padding: .85rem;
  border: none;
  border-radius: 10px;
  background: #4f46e5;
  color: #fff;
  font-family: inherit;
  font-size: .95rem;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s, transform .1s;
}
.btn:hover { background: #4338ca; }
.btn:active { transform: scale(.98); }
.btn:disabled { opacity: .5; cursor: not-allowed; }
.errmsg {
  font-size: .82rem;
  color: #f87171;
  background: rgba(248,113,113,.08);
  border: 1px solid rgba(248,113,113,.25);
  border-radius: 8px;
  padding: .5rem .75rem;
  display: none;
}
</style>
</head>
<body>

<div class="logo">
  <h1>🎬 StreamTogether</h1>
  <p>Screen share, voice chat, and watch movies with friends</p>
</div>

<div class="card">
  <div class="tabs">
    <button class="tab active" id="t0" onclick="switchTab(0)">Create Room</button>
    <button class="tab"        id="t1" onclick="switchTab(1)">Join Room</button>
  </div>

  <!-- CREATE -->
  <div class="panel active" id="p0">
    <div>
      <label>Your Name</label>
      <input id="create-name" placeholder="Enter your name…" maxlength="24" autocomplete="off"/>
    </div>
    <button class="btn" id="create-btn" onclick="createRoom()">🚀 Create Room</button>
    <div class="errmsg" id="create-err"></div>
  </div>

  <!-- JOIN -->
  <div class="panel" id="p1">
    <div>
      <label>Your Name</label>
      <input id="join-name" placeholder="Enter your name…" maxlength="24" autocomplete="off"/>
    </div>
    <div>
      <label>Room Code</label>
      <input id="join-code" placeholder="8-character code" maxlength="8"
             style="letter-spacing:3px;text-transform:uppercase"
             oninput="this.value=this.value.toUpperCase()"/>
    </div>
    <button class="btn" id="join-btn" onclick="joinRoom()">🔗 Join Room</button>
    <div class="errmsg" id="join-err"></div>
  </div>
</div>

<script>
  function switchTab(i) {
    ['t0','t1'].forEach((id,j) => document.getElementById(id).classList.toggle('active', i===j));
    ['p0','p1'].forEach((id,j) => document.getElementById(id).classList.toggle('active', i===j));
  }

  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.style.display = 'block';
  }
  function hideErr(id) { document.getElementById(id).style.display = 'none'; }

  async function createRoom() {
    hideErr('create-err');
    const name = document.getElementById('create-name').value.trim();
    if (!name) { showErr('create-err', 'Please enter your name.'); return; }

    const btn = document.getElementById('create-btn');
    btn.disabled = true;
    btn.textContent = 'Creating…';

    try {
      const res  = await fetch('/room', { method: 'POST' });
      const json = await res.json();
      sessionStorage.setItem('userName', name);
      location.href = '/room/' + json.roomId;
    } catch(e) {
      showErr('create-err', 'Failed to create room. Is the server running?');
      btn.disabled = false;
      btn.textContent = '🚀 Create Room';
    }
  }

  function joinRoom() {
    hideErr('join-err');
    const name = document.getElementById('join-name').value.trim();
    const code = document.getElementById('join-code').value.trim().toUpperCase();
    if (!name) { showErr('join-err', 'Please enter your name.'); return; }
    if (code.length !== 8) { showErr('join-err', 'Room code must be 8 characters.'); return; }
    sessionStorage.setItem('userName', name);
    location.href = '/room/' + code;
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (document.getElementById('p0').classList.contains('active')) createRoom();
    else joinRoom();
  });
</script>
</body>
</html>
