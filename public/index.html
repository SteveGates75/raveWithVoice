<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WatchTogether</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d14;color:#f0f0f8;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;padding:1.5rem}
h1{font-size:2rem;font-weight:800;background:linear-gradient(135deg,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.card{background:#1a1a25;border:1px solid #2a2a3a;border-radius:16px;padding:2rem;width:100%;max-width:380px;display:flex;flex-direction:column;gap:1rem}
.tabs{display:flex;gap:.5rem;background:#0d0d14;padding:.3rem;border-radius:10px}
.tab{flex:1;padding:.55rem;border:none;border-radius:7px;cursor:pointer;font-size:.88rem;font-weight:600;background:transparent;color:#666;font-family:inherit;transition:all .18s}
.tab.on{background:#7c3aed;color:#fff}
.panel{display:none;flex-direction:column;gap:.85rem}
.panel.on{display:flex}
input{padding:.78rem 1rem;background:#0d0d14;border:1px solid #2a2a3a;border-radius:10px;color:#f0f0f8;font-size:.95rem;width:100%;font-family:inherit;transition:border-color .18s}
input:focus{outline:none;border-color:#7c3aed}
input::placeholder{color:#444}
.go{padding:.82rem;border:none;border-radius:10px;background:#7c3aed;color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;width:100%;transition:background .18s}
.go:hover:not(:disabled){background:#6d28d9}
.go:disabled{opacity:.5;cursor:wait}
.msg{font-size:.82rem;padding:.55rem .8rem;border-radius:8px;display:none;line-height:1.4}
.msg.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#f87171}
.msg.ok{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#34d399}
</style>
</head>
<body>

<h1>🎬 WatchTogether</h1>

<div class="card">
  <div class="tabs">
    <button class="tab on"  onclick="sw(0)">Create Room</button>
    <button class="tab"     onclick="sw(1)">Join Room</button>
  </div>

  <!-- CREATE -->
  <div class="panel on" id="p0">
    <input id="c-name" placeholder="Your name" maxlength="20"/>
    <button class="go" id="c-btn" onclick="doCreate()">🎬 Create Room</button>
    <div class="msg" id="c-msg"></div>
  </div>

  <!-- JOIN -->
  <div class="panel" id="p1">
    <input id="j-name" placeholder="Your name" maxlength="20"/>
    <input id="j-code" placeholder="Room code  (e.g. A1B2C3D4)" maxlength="8"
           style="text-transform:uppercase;letter-spacing:2px"
           oninput="this.value=this.value.toUpperCase()"/>
    <button class="go" id="j-btn" onclick="doJoin()">🚀 Join Room</button>
    <div class="msg" id="j-msg"></div>
  </div>
</div>

<script>
function sw(i) {
  document.querySelectorAll('.tab').forEach((t,j)   => t.classList.toggle('on', i===j));
  document.querySelectorAll('.panel').forEach((p,j) => p.classList.toggle('on', i===j));
}

function showMsg(id, text, isErr) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg ' + (isErr ? 'err' : 'ok');
  el.style.display = 'block';
}

async function doCreate() {
  const name = document.getElementById('c-name').value.trim();
  if (!name) { showMsg('c-msg', 'Please enter your name.', true); return; }

  const btn = document.getElementById('c-btn');
  btn.disabled = true;
  btn.textContent = 'Creating…';
  document.getElementById('c-msg').style.display = 'none';

  try {
    const res  = await fetch('/create', { method: 'POST' });
    const data = await res.json();

    if (!data.id) throw new Error('No room ID returned');

    sessionStorage.setItem('wt-name', name);
    // Redirect to the room
    window.location.href = '/room/' + data.id;

  } catch (err) {
    console.error(err);
    showMsg('c-msg',
      'Could not create room.\n' +
      '• Make sure you ran: npm install\n' +
      '• Then: npm start\n' +
      '• Open: http://localhost:3000   (not the file directly)',
      true);
    btn.disabled = false;
    btn.textContent = '🎬 Create Room';
  }
}

function doJoin() {
  const name = document.getElementById('j-name').value.trim();
  const code = document.getElementById('j-code').value.trim().toUpperCase();
  if (!name) { showMsg('j-msg', 'Please enter your name.', true); return; }
  if (code.length !== 8) { showMsg('j-msg', 'Room code must be 8 characters.', true); return; }
  sessionStorage.setItem('wt-name', name);
  window.location.href = '/room/' + code;
}

document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('p0').classList.contains('on')) doCreate();
  else doJoin();
});
</script>
</body>
</html>
